name: Cross-Target CI

# Runs spec/ on both Rust and WASM targets, reports mismatches.

on:
  push:
    branches: [develop]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
      - '.tasks/**'

# Cancel superseded runs on the same ref so a burst of pushes doesn't fire N
# concurrent runs that all re-download tools and trip the per-IP rate limit.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.89.0"

jobs:
  cross-target:
    if: github.server_url == 'https://github.com'
    name: Cross-Target (Rust vs WASM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cross-cargo-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cross-cargo-${{ env.RUST_TOOLCHAIN }}-

      - name: Build
        run: cargo build --release

      - name: Cache wasmtime tarball
        uses: actions/cache@v6
        with:
          path: wasmtime-v42.0.1-x86_64-linux.tar.xz
          key: wasmtime-v42.0.1-x86_64-linux
      - name: Install wasmtime
        run: |
          # Pinned + cached + retried. On a cache hit the tarball is already here,
          # so the per-IP-rate-limited release download runs at most once per key.
          # `-f` turns a 403 rate-limit body into a retry instead of a 92-byte
          # "not a tar archive". Bump VERSION and the cache key together.
          VERSION=v42.0.1
          TARBALL="wasmtime-${VERSION}-x86_64-linux.tar.xz"
          if [ ! -s "$TARBALL" ]; then
            for i in 1 2 3 4 5; do
              curl -fLO "https://github.com/bytecodealliance/wasmtime/releases/download/${VERSION}/${TARBALL}" && break
              echo "wasmtime download failed (rate-limit?), retry ${i}/5"; sleep 15; rm -f "$TARBALL"
            done
          fi
          tar -xf "$TARBALL"
          sudo mv wasmtime-*/wasmtime /usr/local/bin/
          wasmtime --version

      - name: Cross-target spec (Rust vs WASM)
        run: |
          ALMIDE=./target/release/almide
          rust_pass=0; wasm_pass=0; rust_fail=0; wasm_fail=0; both_pass=0; errors=""

          for f in $(find spec/ -name '*_test.almd' -type f | sort); do
            # Skip files marked with wasm:skip
            if head -3 "$f" | grep -q 'wasm:skip'; then continue; fi

            rust_ok=false; wasm_ok=false

            if $ALMIDE test "$f" > /dev/null 2>&1; then
              rust_ok=true; rust_pass=$((rust_pass + 1))
            else
              rust_fail=$((rust_fail + 1))
            fi

            if $ALMIDE test "$f" --target wasm > /dev/null 2>&1; then
              wasm_ok=true; wasm_pass=$((wasm_pass + 1))
            else
              wasm_fail=$((wasm_fail + 1))
            fi

            if $rust_ok && $wasm_ok; then
              both_pass=$((both_pass + 1))
            elif $rust_ok && ! $wasm_ok; then
              errors="$errors\n  WASM FAIL (Rust OK): $f"
            elif ! $rust_ok && $wasm_ok; then
              errors="$errors\n  Rust FAIL (WASM OK): $f"
            fi
          done

          total=$(find spec/ -name '*_test.almd' -type f | wc -l)
          echo ""
          echo "=== Cross-Target Results ==="
          echo "Rust:  $rust_pass pass / $rust_fail fail"
          echo "WASM:  $wasm_pass pass / $wasm_fail fail"
          echo "Both:  $both_pass / $total"

          if [ -n "$errors" ]; then
            echo -e "\nMismatches:$errors"
            echo "::error::Cross-target mismatches found — see above"
            exit 1
          fi

          echo "::notice::Cross-target: Rust $rust_pass, WASM $wasm_pass, both $both_pass / $total"

      - name: v1 trust-spine differential fuzz (render_program v0==v1)
        run: |
          # PER-PR generative byte-match of the V1 TRUST-SPINE path (render_program -> wasm). The
          # cross-target step above exercises the OLD wasm codegen, NOT the trust spine, and the
          # nightly xtarget-fuzz emits only `let`-bound expressions — so the imperative
          # `var v = w; … v = …` shape had NO per-PR gate, which is how the scalar-aliasing miscompile
          # shipped. This synthesizes that class (var reassignment, loops, accumulators, the sha1
          # rotation) PLUS the COMPARISON matrix (==/!=/</<=/>/>= over Int/String/Bool/Float + lists,
          # in if-condition AND value position — the class that shipped the handle-compare / both-arms
          # silent miscompiles) and byte-diffs v0 native vs v1 wasm. N is high enough that every
          # template (now 11) is exercised each run. Any divergence fails the build.
          bash proofs/diff-fuzz.sh 150

      - name: v1 trust-spine output parity (fixtures, ratcheting baseline)
        run: |
          # FIXTURE byte-match of the V1 trust spine over spec/*.almd, gated against a ratcheting
          # baseline (proofs/output-parity-baseline.txt) that can only GROW. The generative fuzz above
          # catches NEW shapes; this catches a REGRESSION in any shape a committed fixture pins. The
          # corpus-wall proves v1's SOUNDNESS properties but never compares stdout — this is the
          # output-correctness leg. Skips gracefully if almide/wasmtime are absent.
          bash proofs/output-parity.sh
