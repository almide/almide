name: Cross-Target CI

# Runs spec/ on both Rust and WASM targets, reports mismatches.

on:
  push:
    branches: [develop]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
      - '.tasks/**'

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.89.0"

jobs:
  cross-target:
    name: Cross-Target (Rust vs WASM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cross-cargo-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cross-cargo-${{ env.RUST_TOOLCHAIN }}-

      - name: Build
        run: cargo build --release

      - name: Install wasmtime
        run: |
          VERSION=$(curl -s https://api.github.com/repos/bytecodealliance/wasmtime/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          curl -LO "https://github.com/bytecodealliance/wasmtime/releases/download/${VERSION}/wasmtime-${VERSION}-x86_64-linux.tar.xz"
          tar -xf wasmtime-*.tar.xz
          sudo mv wasmtime-*/wasmtime /usr/local/bin/
          wasmtime --version

      - name: Cross-target spec (Rust vs WASM)
        run: |
          ALMIDE=./target/release/almide
          passed=0; failed=0; skipped=0; errors=""

          for f in $(find spec/ -name '*.almd' -type f | sort); do
            # Skip Rust-only failures
            $ALMIDE test "$f" > /dev/null 2>&1 || { skipped=$((skipped + 1)); continue; }

            # WASM run
            if $ALMIDE test "$f" --target wasm > /dev/null 2>&1; then
              passed=$((passed + 1))
            else
              failed=$((failed + 1))
              errors="$errors\n  FAIL: $f"
            fi
          done

          echo ""
          echo "=== Cross-Target Results (Rust vs WASM) ==="
          echo "Pass:    $passed"
          echo "Fail:    $failed"
          echo "Skip:    $skipped"
          echo "Total:   $((passed + failed + skipped))"

          if [ -n "$errors" ]; then
            echo -e "\nFailures:$errors"
          fi

          echo "::notice::Cross-target: $passed pass, $failed fail, $skipped skip"

          if [ $failed -gt 0 ]; then
            echo "::error::Cross-target regressions detected ($failed failures)"
            exit 1
          fi
