name: Cross-Target CI

# Runs spec/ and exercises/ on both Rust and TS targets, reports mismatches.
# 90/91 pass as of 2026-03-17. 1 known limitation: codegen_do_block_test (break in IIFE).

on:
  push:
    branches: [develop]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
      - '.tasks/**'

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.89.0"

jobs:
  cross-target:
    name: Cross-Target (Rust vs TS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cross-cargo-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cross-cargo-${{ env.RUST_TOOLCHAIN }}-

      - name: Build
        run: cargo build --release

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Cross-target spec + exercises
        run: |
          ALMIDE=./target/release/almide
          passed=0; failed=0; skipped=0; errors=""

          for f in $(find spec/ exercises/ -name '*.almd' -type f | sort); do
            # Skip Rust-only failures
            $ALMIDE test "$f" > /dev/null 2>&1 || { skipped=$((skipped + 1)); continue; }

            # TS emit
            ts_code=$($ALMIDE "$f" --target ts 2>/dev/null) || { skipped=$((skipped + 1)); continue; }
            [ -z "$ts_code" ] && { skipped=$((skipped + 1)); continue; }

            # TS run
            echo "$ts_code" > /tmp/cross_ts.ts
            if deno run --allow-all /tmp/cross_ts.ts > /dev/null 2>&1; then
              passed=$((passed + 1))
            else
              failed=$((failed + 1))
              errors="$errors\n  FAIL: $f"
            fi
          done

          echo ""
          echo "=== Cross-Target Results ==="
          echo "Pass:    $passed"
          echo "Fail:    $failed"
          echo "Skip:    $skipped"
          echo "Total:   $((passed + failed + skipped))"

          if [ -n "$errors" ]; then
            echo -e "\nFailures:$errors"
          fi

          echo "::notice::Cross-target: $passed pass, $failed fail, $skipped skip"

          # Allow up to 2 known failures (codegen_do_block_test + buffer)
          if [ $failed -gt 2 ]; then
            echo "::error::Cross-target regressions detected ($failed failures, max allowed: 2)"
            exit 1
          fi
