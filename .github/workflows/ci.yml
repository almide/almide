name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.89.0"

jobs:
  # ═══════════════════════════════════════════════
  # Build — shared by all jobs
  # ═══════════════════════════════════════════════

  build:
    name: Build (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-cargo-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-cargo-${{ env.RUST_TOOLCHAIN }}-

      - run: cargo build --release

      - uses: actions/upload-artifact@v4
        with:
          name: almide-linux
          path: target/release/almide
          retention-days: 1

  # ═══════════════════════════════════════════════
  # Target tests — all run on every develop/main PR
  # ═══════════════════════════════════════════════

  test-rust:
    name: Test Rust
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: almide-linux
          path: /tmp/almide-bin

      - name: Setup
        run: chmod +x /tmp/almide-bin/almide

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cargo tests
        run: cargo test

      - name: Almide spec tests (Rust target)
        run: |
          ALMIDE=/tmp/almide-bin/almide
          $ALMIDE test spec/

  test-wasm:
    name: Test WASM
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: almide-linux
          path: /tmp/almide-bin

      - name: Setup almide
        run: chmod +x /tmp/almide-bin/almide

      - name: Install wasmtime
        run: |
          VERSION=$(curl -s https://api.github.com/repos/bytecodealliance/wasmtime/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          curl -LO "https://github.com/bytecodealliance/wasmtime/releases/download/${VERSION}/wasmtime-${VERSION}-x86_64-linux.tar.xz"
          tar -xf wasmtime-*.tar.xz
          sudo mv wasmtime-*/wasmtime /usr/local/bin/
          wasmtime --version

      - name: Almide spec tests (WASM target)
        run: |
          ALMIDE=/tmp/almide-bin/almide
          $ALMIDE test spec/ --target wasm

  # ═══════════════════════════════════════════════
  # Checks
  # ═══════════════════════════════════════════════

  checks:
    name: Emit & Format
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: almide-linux
          path: /tmp/almide-bin

      - name: Setup
        run: chmod +x /tmp/almide-bin/almide

      - name: Smoke test - emit targets
        run: |
          ALMIDE=/tmp/almide-bin/almide
          f=$(find spec/lang -name '*_test.almd' | head -1)
          [ -z "$f" ] && echo "No spec files found" && exit 0
          $ALMIDE "$f" --target rust > /dev/null && echo "Rust emit OK"
          $ALMIDE "$f" --emit-ast    > /dev/null && echo "AST emit OK"

  # ═══════════════════════════════════════════════
  # Full CI — cross-platform (PRs to main only)
  # ═══════════════════════════════════════════════

  build-cross:
    name: Build (${{ matrix.os }})
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: almide-macos
          - os: windows-latest
            artifact: almide-windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-${{ env.RUST_TOOLCHAIN }}-

      - run: cargo build --release

      - run: cargo test

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/release/almide${{ matrix.os == 'windows-latest' && '.exe' || '' }}
          retention-days: 1

  test-rust-cross:
    name: Test Rust (${{ matrix.os }})
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    needs: build-cross
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: almide-macos
            binary: /tmp/almide-bin/almide
          - os: windows-latest
            artifact: almide-windows
            binary: almide-bin/almide.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.os == 'windows-latest' && 'almide-bin' || '/tmp/almide-bin' }}

      - name: Setup (Unix)
        if: matrix.os != 'windows-latest'
        run: chmod +x /tmp/almide-bin/almide

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Almide spec tests (Rust target)
        shell: bash
        run: |
          ALMIDE=${{ matrix.binary }}
          $ALMIDE test spec/

  # ═══════════════════════════════════════════════
  # Post-merge — trigger playground deploy
  # ═══════════════════════════════════════════════

  trigger-playground:
    name: Trigger Playground Deploy
    needs: [test-rust, checks]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch playground deploy
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: token ${{ secrets.PLAYGROUND_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/almide/playground/dispatches \
            -d '{"event_type":"compiler-updated"}'
