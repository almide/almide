name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'

# Cancel superseded runs on the same ref so a burst of pushes doesn't fire N
# concurrent runs that all re-download tools and trip the per-IP rate limit.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.89.0"

jobs:
  # ═══════════════════════════════════════════════
  # Build — shared by all jobs
  # ═══════════════════════════════════════════════

  build:
    if: github.server_url == 'https://github.com'
    name: Build (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-cargo-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-cargo-${{ env.RUST_TOOLCHAIN }}-

      - run: cargo build --release

      - uses: actions/upload-artifact@v7
        with:
          name: almide-linux
          path: target/release/almide
          retention-days: 1

  # ═══════════════════════════════════════════════
  # Target tests — all run on every develop/main PR
  # ═══════════════════════════════════════════════

  test-rust:
    name: Test Rust
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          name: almide-linux
          path: /tmp/almide-bin

      - name: Setup
        run: chmod +x /tmp/almide-bin/almide

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache wasmtime tarball
        uses: actions/cache@v6
        with:
          path: wasmtime-v42.0.1-x86_64-linux.tar.xz
          key: wasmtime-v42.0.1-x86_64-linux
      - name: Install wasmtime
        # Required by the cross-target gate (wasm_cross_target_spec) and the
        # wasm_runtime_test capture tests — without it they skip, so the
        # cross-target ratchet would not actually enforce here.
        run: |
          # Pinned + cached + retried. On a cache hit the tarball is already here,
          # so the per-IP-rate-limited release download runs at most once per key
          # (the uncached variant burned all 5 retries on a 429 storm, 2026-07-11).
          # `-f` turns a 403 rate-limit body into a retry instead of a 92-byte
          # "not a tar archive". Bump VERSION and the cache key together.
          VERSION=v42.0.1
          TARBALL="wasmtime-${VERSION}-x86_64-linux.tar.xz"
          if [ ! -s "$TARBALL" ]; then
            for i in 1 2 3 4 5; do
              curl -fLO "https://github.com/bytecodealliance/wasmtime/releases/download/${VERSION}/${TARBALL}" && break
              echo "wasmtime download failed (rate-limit?), retry ${i}/5"; sleep 15; rm -f "$TARBALL"
            done
          fi
          tar -xf "$TARBALL"
          sudo mv wasmtime-*/wasmtime /usr/local/bin/
          wasmtime --version

      - name: Cargo tests
        # Parallel-safe: the shared build scratch dir (/tmp/almide-run,
        # /tmp/almide-build) is serialized across processes by an advisory
        # flock (see src/cli/run.rs BuildDirLock). Unix only — this runner
        # is ubuntu, so the lock applies.
        # ALMIDE_BIN points the cross-target tests at the built compiler (else
        # almide_bin() falls back to PATH and the tests skip).
        env:
          ALMIDE_BIN: /tmp/almide-bin/almide
        run: cargo test

      - name: Generated runtime registry matches committed sources (regenerate and diff)
        # crates/almide-codegen/src/generated/{rust_runtime,runtime_fn_modes}.rs
        # are committed, but build.rs regenerates them from runtime/rs/src by
        # embedding each module's source TEXT. A draft edited in runtime/rs/src
        # but not committed can be baked into the generated file and committed on
        # its own, silently desyncing the two (this is exactly how the #419
        # codepoint draft leaked). Force a fresh regen (touch the generator so
        # cargo re-runs the build script) and fail on any diff — in CI only
        # committed sources exist, so a leaked draft cannot reproduce. Mirrors the
        # "Contract README up to date" regenerate-and-diff gate.
        run: |
          touch crates/almide-codegen/buildscript/runtime_registry.rs
          cargo build -p almide-codegen
          git diff --exit-code -- \
            crates/almide-codegen/src/generated/rust_runtime.rs \
            crates/almide-codegen/src/generated/runtime_fn_modes.rs \
            || { echo "::error::generated runtime registry is stale — a runtime/rs/src edit was not committed, or a generated file was hand-edited. Rebuild almide-codegen and commit crates/almide-codegen/src/generated/*.rs"; exit 1; }

      - name: Almide spec tests (Rust target)
        run: |
          ALMIDE=/tmp/almide-bin/almide
          $ALMIDE test spec/ --target rust

      - name: Almide examples tests
        run: |
          ALMIDE=/tmp/almide-bin/almide
          $ALMIDE test examples/

  test-arm:
    name: Test ARM (NEON, Apple Silicon)
    # almide-kernel's NEON kernels (silu/softmax/gelu/q1_0) cross-built on the x86
    # runners but were never *executed* — build-cross only proves they compile.
    # macos-14 is Apple Silicon, where NEON is the ARMv8 baseline, so the public
    # dispatch entry runs the *_neon path and the crate's differential tests compare
    # it against the scalar reference: a real correctness gate, not theatre.
    # The crate is `exclude`d from the workspace and carries its own empty
    # [workspace], so it is driven via --manifest-path (a root `-p almide-kernel`
    # cannot see an excluded package). No `needs: build` — it tests only the kernel.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            crates/almide-kernel/target
          key: macos-arm-cargo-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('crates/almide-kernel/Cargo.toml') }}
          restore-keys: macos-arm-cargo-${{ env.RUST_TOOLCHAIN }}-

      - name: Test almide-kernel on real ARM (NEON executes, diffed vs scalar)
        # almide-kernel has no committed [workspace] (that would break `almide build`'s
        # generated ML projects, which path-depend on it). Append one ephemerally so
        # cargo can test the excluded crate standalone — harmless here, this job never
        # runs `almide build`.
        run: |
          printf '\n[workspace]\n' >> crates/almide-kernel/Cargo.toml
          cargo test --release --manifest-path crates/almide-kernel/Cargo.toml

  test-wasm:
    name: Test WASM
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          name: almide-linux
          path: /tmp/almide-bin

      - name: Setup almide
        run: chmod +x /tmp/almide-bin/almide

      - name: Cache wasmtime tarball
        uses: actions/cache@v6
        with:
          path: wasmtime-v42.0.1-x86_64-linux.tar.xz
          key: wasmtime-v42.0.1-x86_64-linux
      - name: Install wasmtime
        run: |
          # Pinned + cached + retried. On a cache hit the tarball is already here,
          # so the per-IP-rate-limited release download runs at most once per key.
          # `-f` turns a 403 rate-limit body into a retry instead of a 92-byte
          # "not a tar archive". Bump VERSION and the cache key together.
          VERSION=v42.0.1
          TARBALL="wasmtime-${VERSION}-x86_64-linux.tar.xz"
          if [ ! -s "$TARBALL" ]; then
            for i in 1 2 3 4 5; do
              curl -fLO "https://github.com/bytecodealliance/wasmtime/releases/download/${VERSION}/${TARBALL}" && break
              echo "wasmtime download failed (rate-limit?), retry ${i}/5"; sleep 15; rm -f "$TARBALL"
            done
          fi
          tar -xf "$TARBALL"
          sudo mv wasmtime-*/wasmtime /usr/local/bin/
          wasmtime --version

      - name: Almide spec tests (WASM target)
        run: |
          ALMIDE=/tmp/almide-bin/almide
          $ALMIDE test spec/ --target wasm

  # ═══════════════════════════════════════════════
  # WASM host-arch codegen determinism
  #
  # The compiler runs as wasm32 in the browser playground but as 64-bit in the
  # test suite. A codegen path whose output depends on host pointer width or
  # HashMap iteration order emits a different — but stack-/RC-valid — module on
  # 32-bit, which can trap (`RuntimeError: unreachable`). The stack/Perceus
  # verifiers check one module's well-formedness, not reproducibility across
  # hosts. This gate compiles each fixture with the compiler built BOTH natively
  # and to wasm32-wasip1 and asserts byte-identical output.
  # ═══════════════════════════════════════════════

  wasm-host-determinism:
    name: WASM host-arch determinism
    if: github.server_url == 'https://github.com'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: wasm32-wasip1, wasm32-unknown-unknown

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tools/wasmgen-harness/target
            tools/wasmgen-harness-uu/target
          key: wasmgen-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('crates/almide-codegen/src/emit_wasm/**', 'crates/almide-codegen/src/lib.rs', 'crates/almide-codegen/src/pass.rs') }}
          restore-keys: wasmgen-${{ env.RUST_TOOLCHAIN }}-

      - name: Cache wasmtime tarball
        uses: actions/cache@v6
        with:
          path: wasmtime-v42.0.1-x86_64-linux.tar.xz
          key: wasmtime-v42.0.1-x86_64-linux
      - name: Install wasmtime
        run: |
          # Pinned + cached + retried. On a cache hit the tarball is already here,
          # so the per-IP-rate-limited release download runs at most once per key.
          # `-f` turns a 403 rate-limit body into a retry instead of a 92-byte
          # "not a tar archive". Bump VERSION and the cache key together.
          VERSION=v42.0.1
          TARBALL="wasmtime-${VERSION}-x86_64-linux.tar.xz"
          if [ ! -s "$TARBALL" ]; then
            for i in 1 2 3 4 5; do
              curl -fLO "https://github.com/bytecodealliance/wasmtime/releases/download/${VERSION}/${TARBALL}" && break
              echo "wasmtime download failed (rate-limit?), retry ${i}/5"; sleep 15; rm -f "$TARBALL"
            done
          fi
          tar -xf "$TARBALL"
          sudo mv wasmtime-*/wasmtime /usr/local/bin/
          wasmtime --version

      - name: Host-arch codegen determinism (wasm32-wasip1 vs native, byte-identical)
        run: scripts/check-host-determinism.sh

      - name: Browser-ABI determinism (wasm32-unknown-unknown via node, no panic + byte-identical)
        run: scripts/check-browser-determinism.sh

  # ═══════════════════════════════════════════════
  # Lean Proofs (AlmidePerceusBelt)
  # ═══════════════════════════════════════════════

  lean-proofs:
    if: github.server_url == 'https://github.com'
    name: Lean Proofs (0 sorry)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Two complementary checks — both are required for the "proven" claim:
      # 1. grep for `sorry`: `lake build` only WARNS on sorry, so the grep is what
      #    enforces that every theorem is actually proven, not stubbed.
      # 2. `lake build`: kernel-checks that the proofs really compile — without it
      #    a broken proof (or one that only ever built locally) passes CI silently.
      - name: Verify 0 sorry
        run: |
          if grep -rn '\bsorry\b' crates/almide-perceus-belt/AlmidePerceusBelt/ --include='*.lean'; then
            echo "::error::sorry found in Lean proofs — all theorems must be fully proven"
            exit 1
          fi
          echo "✓ 0 sorry in Lean proofs"

      - name: Cache elan + Lean toolchain
        uses: actions/cache@v6
        with:
          path: ~/.elan
          key: elan-${{ runner.os }}-${{ hashFiles('crates/almide-perceus-belt/lean-toolchain') }}

      - name: Install elan (retry-resilient)
        # lean-action's internal elan-init has no retry, so a transient GitHub 504
        # (or 403 rate-limit) on the elan tarball download fails the whole job.
        # Pre-install elan here with a retry loop — and cache ~/.elan above — so
        # lean-action finds elan already in PATH and skips its own fragile download.
        run: |
          if [ ! -x "$HOME/.elan/bin/elan" ]; then
            for i in 1 2 3 4 5; do
              curl -sSfL https://github.com/leanprover/elan/releases/latest/download/elan-x86_64-unknown-linux-gnu.tar.gz -o /tmp/elan.tar.gz && break
              echo "elan download failed (504/rate-limit?), retry ${i}/5"; sleep 20; rm -f /tmp/elan.tar.gz
            done
            tar xzf /tmp/elan.tar.gz -C /tmp
            /tmp/elan-init -y --default-toolchain none --no-modify-path
          fi
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Kernel-check proofs (lake build)
        uses: leanprover/lean-action@v1
        # Authenticate the elan/toolchain release-tag API calls so they use the
        # 5000/hr authenticated limit instead of the 60/hr per-IP one that
        # intermittently 403s with "failed to parse latest release tag".
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          lake-package-directory: crates/almide-perceus-belt

  # ═══════════════════════════════════════════════
  # Checks
  # ═══════════════════════════════════════════════

  checks:
    name: Emit & Format
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          name: almide-linux
          path: /tmp/almide-bin

      - name: Setup
        run: chmod +x /tmp/almide-bin/almide

      - name: Smoke test - emit targets
        run: |
          ALMIDE=/tmp/almide-bin/almide
          f=$(find spec/lang -name '*_test.almd' | head -1)
          [ -z "$f" ] && echo "No spec files found" && exit 0
          $ALMIDE "$f" --target rust > /dev/null && echo "Rust emit OK"
          $ALMIDE "$f" --emit-ast    > /dev/null && echo "AST emit OK"

      - name: Forbidden impurities (no raw clocks/threads in the compile path)
        run: scripts/check-forbidden-impurities.sh

      - name: WASM runtime oracle-pairing registry (every compile_* registered + verified tests exist)
        run: scripts/check-rt-oracle-registry.sh

      - name: Contract ledger traceability (every contract evidenced, every fixture contracted)
        run: scripts/check-contracts.sh

      - name: Stdlib semantics manifest (coverage + regen-diff, #521)
        run: scripts/check-semantics-manifest.sh

      - name: Contract README up to date (regenerate and diff)
        run: |
          bash docs/contracts/generate-readme.sh > docs/contracts/README.md
          git diff --exit-code -- docs/contracts/README.md \
            || { echo "::error::docs/contracts/README.md is stale — run: bash docs/contracts/generate-readme.sh > docs/contracts/README.md"; exit 1; }

  # ═══════════════════════════════════════════════
  # Full CI — cross-platform (PRs to main only)
  # ═══════════════════════════════════════════════

  build-cross:
    name: Build (${{ matrix.os }})
    if: github.server_url == 'https://github.com' && github.event_name == 'pull_request' && github.base_ref == 'main'
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: almide-macos
          - os: windows-latest
            artifact: almide-windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-${{ env.RUST_TOOLCHAIN }}-

      - run: cargo build --release

      - name: Install wasmtime
        if: runner.os != 'Windows'
        run: curl https://wasmtime.dev/install.sh -sSf | bash && echo "$HOME/.wasmtime/bin" >> $GITHUB_PATH

      # Parallel on every OS: the build-scratch lock (BuildDirLock) is now
      # cross-platform (flock / LockFileEx via fs2), so concurrent `almide`
      # subprocesses no longer race the shared scratch dir on Windows.
      - run: cargo test

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: target/release/almide${{ matrix.os == 'windows-latest' && '.exe' || '' }}
          retention-days: 1

  test-rust-cross:
    name: Test Rust (${{ matrix.os }})
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    needs: build-cross
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: almide-macos
            binary: /tmp/almide-bin/almide
          - os: windows-latest
            artifact: almide-windows
            binary: almide-bin/almide.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.os == 'windows-latest' && 'almide-bin' || '/tmp/almide-bin' }}

      - name: Setup (Unix)
        if: matrix.os != 'windows-latest'
        run: chmod +x /tmp/almide-bin/almide

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Almide spec tests (Rust target)
        shell: bash
        run: |
          ALMIDE=${{ matrix.binary }}
          $ALMIDE test spec/ --target rust

  # ═══════════════════════════════════════════════
  # Post-merge — trigger playground deploy
  # ═══════════════════════════════════════════════

  trigger-playground:
    name: Trigger Playground Deploy
    # Gate the deploy on host-arch determinism: the playground runs the compiler
    # as wasm32, so a 32/64-bit codegen divergence must block deploy, not ship.
    needs: [test-rust, checks, wasm-host-determinism]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch playground deploy
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: token ${{ secrets.PLAYGROUND_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/almide/playground/dispatches \
            -d '{"event_type":"compiler-updated"}'
