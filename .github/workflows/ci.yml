name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.89.0"

jobs:
  # ═══════════════════════════════════════════════
  # Fast CI — runs on every push to develop
  # Build (Linux) + Rust target test + checks
  # ═══════════════════════════════════════════════

  build:
    name: Build (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-cargo-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-cargo-${{ env.RUST_TOOLCHAIN }}-

      - run: cargo build --release

      - uses: actions/upload-artifact@v4
        with:
          name: almide-linux
          path: target/release/almide
          retention-days: 1

  test-rust:
    name: Test (Linux)
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: almide-linux
          path: /tmp/almide-bin

      - name: Setup
        run: chmod +x /tmp/almide-bin/almide

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cargo tests
        run: cargo test

      - name: Almide spec tests
        run: |
          ALMIDE=/tmp/almide-bin/almide
          $ALMIDE test spec/lang/ || true

  checks:
    name: Emit & Format
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: almide-linux
          path: /tmp/almide-bin

      - name: Setup
        run: chmod +x /tmp/almide-bin/almide

      - name: Smoke test - all emit targets
        run: |
          ALMIDE=/tmp/almide-bin/almide
          f=$(find spec/lang -name '*_test.almd' | head -1)
          [ -z "$f" ] && echo "No spec files found" && exit 0
          $ALMIDE "$f" --target rust > /dev/null && echo "Rust emit OK"
          $ALMIDE "$f" --target ts   > /dev/null && echo "TS emit OK"
          $ALMIDE "$f" --target js   > /dev/null && echo "JS emit OK"
          $ALMIDE "$f" --emit-ast    > /dev/null && echo "AST emit OK"

  # ═══════════════════════════════════════════════
  # Full CI — runs on PRs to main only
  # Cross-platform builds, TS/JS targets, WASM
  # ═══════════════════════════════════════════════

  build-cross:
    name: Build (${{ matrix.os }})
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: almide-macos
          - os: windows-latest
            artifact: almide-windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-${{ env.RUST_TOOLCHAIN }}-

      - run: cargo build --release

      - run: cargo test

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/release/almide${{ matrix.os == 'windows-latest' && '.exe' || '' }}
          retention-days: 1

  test-rust-cross:
    name: Test Rust (${{ matrix.os }})
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    needs: build-cross
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: almide-macos
            binary: /tmp/almide-bin/almide
          - os: windows-latest
            artifact: almide-windows
            binary: almide-bin/almide.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.os == 'windows-latest' && 'almide-bin' || '/tmp/almide-bin' }}

      - name: Setup (Unix)
        if: matrix.os != 'windows-latest'
        run: chmod +x /tmp/almide-bin/almide

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Run all exercises (Rust target)
        continue-on-error: true  # exercises need v0.6.0 rewrite
        shell: bash
        run: |
          ALMIDE=${{ matrix.binary }}
          failed=0; passed=0
          for f in exercises/*/*.almd; do
            case "$f" in *_error_test.almd) continue;; esac
            if $ALMIDE run "$f" 2>&1; then
              passed=$((passed + 1))
            else
              echo "FAIL: $f"
              failed=$((failed + 1))
            fi
          done
          echo "Rust target: $passed passed, $failed failed"
          [ $failed -eq 0 ]

  test-ts:
    name: Test TS/Deno
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: almide-linux
          path: /tmp/almide-bin

      - name: Setup
        run: chmod +x /tmp/almide-bin/almide

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run all exercises (TS target)
        continue-on-error: true  # exercises need v0.6.0 rewrite
        run: |
          ALMIDE=/tmp/almide-bin/almide
          failed=0; passed=0
          for f in exercises/*/*.almd; do
            case "$f" in *_error_test.almd) continue;; esac
            $ALMIDE "$f" --target ts > /tmp/test_out.ts 2>/dev/null || continue
            if deno run --allow-all --no-check /tmp/test_out.ts 2>&1; then
              passed=$((passed + 1))
            else
              echo "FAIL: $f"
              failed=$((failed + 1))
            fi
          done
          echo "TS target: $passed passed, $failed failed"
          [ $failed -eq 0 ]

  test-js:
    name: Test JS/Node
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: almide-linux
          path: /tmp/almide-bin

      - name: Setup
        run: chmod +x /tmp/almide-bin/almide

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run exercises (JS target)
        continue-on-error: true  # exercises need v0.6.0 rewrite
        run: |
          ALMIDE=/tmp/almide-bin/almide
          failed=0; passed=0
          for f in exercises/*/*.almd; do
            case "$f" in *_error_test.almd) continue;; esac
            $ALMIDE "$f" --target js > /tmp/test_out.js 2>/dev/null || continue
            if node /tmp/test_out.js 2>&1; then
              passed=$((passed + 1))
            else
              echo "FAIL: $f"
              failed=$((failed + 1))
            fi
          done
          echo "JS target: $passed passed, $failed failed"
          [ $failed -eq 0 ]

  wasm:
    name: WASM
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: almide-linux
          path: /tmp/almide-bin

      - name: Setup almide
        run: chmod +x /tmp/almide-bin/almide

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: wasm32-wasip1

      - name: Install wasmtime
        run: |
          VERSION=$(curl -s https://api.github.com/repos/bytecodealliance/wasmtime/releases/latest | grep '"tag_name"' | cut -d'"' -f4)
          curl -LO "https://github.com/bytecodealliance/wasmtime/releases/download/${VERSION}/wasmtime-${VERSION}-x86_64-linux.tar.xz"
          tar -xf wasmtime-*.tar.xz
          sudo mv wasmtime-*/wasmtime /usr/local/bin/
          wasmtime --version

      - name: WASM smoke test
        continue-on-error: true  # exercises need v0.6.0 rewrite
        run: |
          ALMIDE=/tmp/almide-bin/almide
          $ALMIDE build exercises/wasm-smoke/wasm-smoke.almd --target wasm -o /tmp/wasm-smoke.wasm
          wasmtime /tmp/wasm-smoke.wasm

      - name: WASM emit check
        run: |
          ALMIDE=/tmp/almide-bin/almide
          for dir in pangram raindrops roman-numerals; do
            f=$(ls exercises/$dir/*.almd 2>/dev/null | head -1)
            [ -z "$f" ] && continue
            $ALMIDE "$f" --target rust > /dev/null 2>&1 && echo "EMIT OK: $dir"
          done

  # ═══════════════════════════════════════════════
  # Post-merge — trigger playground deploy
  # ═══════════════════════════════════════════════

  trigger-playground:
    name: Trigger Playground Deploy
    needs: [test-rust, checks]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch playground deploy
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: token ${{ secrets.PLAYGROUND_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/almide/playground/dispatches \
            -d '{"event_type":"compiler-updated"}'
