name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.89.0"

jobs:
  # ═══════════════════════════════════════════════
  # Build — shared by all jobs
  # ═══════════════════════════════════════════════

  build:
    if: github.server_url == 'https://github.com'
    name: Build (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: linux-cargo-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: linux-cargo-${{ env.RUST_TOOLCHAIN }}-

      - run: cargo build --release

      - uses: actions/upload-artifact@v4
        with:
          name: almide-linux
          path: target/release/almide
          retention-days: 1

  # ═══════════════════════════════════════════════
  # Target tests — all run on every develop/main PR
  # ═══════════════════════════════════════════════

  test-rust:
    name: Test Rust
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: almide-linux
          path: /tmp/almide-bin

      - name: Setup
        run: chmod +x /tmp/almide-bin/almide

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Install wasmtime
        # Required by the cross-target gate (wasm_cross_target_spec) and the
        # wasm_runtime_test capture tests — without it they skip, so the
        # cross-target ratchet would not actually enforce here.
        run: |
          # Pinned (not "latest"): the unauthenticated releases/latest API call is
          # rate-limited per runner IP and intermittently returns an error body,
          # yielding an empty VERSION and a garbage download (hit 2026-06-06).
          # A pinned toolchain is also reproducible. Bump deliberately.
          VERSION=v42.0.1
          # Retry with `-f` (fail on HTTP error, e.g. a 403 rate-limit body) so a
          # transient per-IP rate-limit on the release asset is retried, not saved
          # as a 92-byte "not a tar archive".
          for i in 1 2 3 4 5; do
            curl -fLO "https://github.com/bytecodealliance/wasmtime/releases/download/${VERSION}/wasmtime-${VERSION}-x86_64-linux.tar.xz" && break
            echo "wasmtime download failed (rate-limit?), retry ${i}/5"; sleep 15; rm -f wasmtime-*.tar.xz
          done
          tar -xf wasmtime-*.tar.xz
          sudo mv wasmtime-*/wasmtime /usr/local/bin/
          wasmtime --version

      - name: Cargo tests
        # Parallel-safe: the shared build scratch dir (/tmp/almide-run,
        # /tmp/almide-build) is serialized across processes by an advisory
        # flock (see src/cli/run.rs BuildDirLock). Unix only — this runner
        # is ubuntu, so the lock applies.
        # ALMIDE_BIN points the cross-target tests at the built compiler (else
        # almide_bin() falls back to PATH and the tests skip).
        env:
          ALMIDE_BIN: /tmp/almide-bin/almide
        run: cargo test

      - name: Almide spec tests (Rust target)
        run: |
          ALMIDE=/tmp/almide-bin/almide
          $ALMIDE test spec/ --target rust

      - name: Almide examples tests
        run: |
          ALMIDE=/tmp/almide-bin/almide
          $ALMIDE test examples/

  test-wasm:
    name: Test WASM
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: almide-linux
          path: /tmp/almide-bin

      - name: Setup almide
        run: chmod +x /tmp/almide-bin/almide

      - name: Install wasmtime
        run: |
          # Pinned (not "latest"): the unauthenticated releases/latest API call is
          # rate-limited per runner IP and intermittently returns an error body,
          # yielding an empty VERSION and a garbage download (hit 2026-06-06).
          # A pinned toolchain is also reproducible. Bump deliberately.
          VERSION=v42.0.1
          # Retry with `-f` (fail on HTTP error, e.g. a 403 rate-limit body) so a
          # transient per-IP rate-limit on the release asset is retried, not saved
          # as a 92-byte "not a tar archive".
          for i in 1 2 3 4 5; do
            curl -fLO "https://github.com/bytecodealliance/wasmtime/releases/download/${VERSION}/wasmtime-${VERSION}-x86_64-linux.tar.xz" && break
            echo "wasmtime download failed (rate-limit?), retry ${i}/5"; sleep 15; rm -f wasmtime-*.tar.xz
          done
          tar -xf wasmtime-*.tar.xz
          sudo mv wasmtime-*/wasmtime /usr/local/bin/
          wasmtime --version

      - name: Almide spec tests (WASM target)
        run: |
          ALMIDE=/tmp/almide-bin/almide
          $ALMIDE test spec/ --target wasm

  # ═══════════════════════════════════════════════
  # WASM host-arch codegen determinism
  #
  # The compiler runs as wasm32 in the browser playground but as 64-bit in the
  # test suite. A codegen path whose output depends on host pointer width or
  # HashMap iteration order emits a different — but stack-/RC-valid — module on
  # 32-bit, which can trap (`RuntimeError: unreachable`). The stack/Perceus
  # verifiers check one module's well-formedness, not reproducibility across
  # hosts. This gate compiles each fixture with the compiler built BOTH natively
  # and to wasm32-wasip1 and asserts byte-identical output.
  # ═══════════════════════════════════════════════

  wasm-host-determinism:
    name: WASM host-arch determinism
    if: github.server_url == 'https://github.com'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          targets: wasm32-wasip1, wasm32-unknown-unknown

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tools/wasmgen-harness/target
            tools/wasmgen-harness-uu/target
          key: wasmgen-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('crates/almide-codegen/src/emit_wasm/**', 'crates/almide-codegen/src/lib.rs', 'crates/almide-codegen/src/pass.rs') }}
          restore-keys: wasmgen-${{ env.RUST_TOOLCHAIN }}-

      - name: Install wasmtime
        run: |
          # Pinned (not "latest"): the unauthenticated releases/latest API call is
          # rate-limited per runner IP and intermittently returns an error body,
          # yielding an empty VERSION and a garbage download (hit 2026-06-06).
          # A pinned toolchain is also reproducible. Bump deliberately.
          VERSION=v42.0.1
          # Retry with `-f` (fail on HTTP error, e.g. a 403 rate-limit body) so a
          # transient per-IP rate-limit on the release asset is retried, not saved
          # as a 92-byte "not a tar archive".
          for i in 1 2 3 4 5; do
            curl -fLO "https://github.com/bytecodealliance/wasmtime/releases/download/${VERSION}/wasmtime-${VERSION}-x86_64-linux.tar.xz" && break
            echo "wasmtime download failed (rate-limit?), retry ${i}/5"; sleep 15; rm -f wasmtime-*.tar.xz
          done
          tar -xf wasmtime-*.tar.xz
          sudo mv wasmtime-*/wasmtime /usr/local/bin/
          wasmtime --version

      - name: Host-arch codegen determinism (wasm32-wasip1 vs native, byte-identical)
        run: scripts/check-host-determinism.sh

      - name: Browser-ABI determinism (wasm32-unknown-unknown via node, no panic + byte-identical)
        run: scripts/check-browser-determinism.sh

  # ═══════════════════════════════════════════════
  # Lean Proofs (AlmidePerceusBelt)
  # ═══════════════════════════════════════════════

  lean-proofs:
    if: github.server_url == 'https://github.com'
    name: Lean Proofs (0 sorry)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Two complementary checks — both are required for the "proven" claim:
      # 1. grep for `sorry`: `lake build` only WARNS on sorry, so the grep is what
      #    enforces that every theorem is actually proven, not stubbed.
      # 2. `lake build`: kernel-checks that the proofs really compile — without it
      #    a broken proof (or one that only ever built locally) passes CI silently.
      - name: Verify 0 sorry
        run: |
          if grep -rn '\bsorry\b' crates/almide-perceus-belt/AlmidePerceusBelt/ --include='*.lean'; then
            echo "::error::sorry found in Lean proofs — all theorems must be fully proven"
            exit 1
          fi
          echo "✓ 0 sorry in Lean proofs"

      - name: Kernel-check proofs (lake build)
        uses: leanprover/lean-action@v1
        # Authenticate the elan/toolchain release-tag API calls so they use the
        # 5000/hr authenticated limit instead of the 60/hr per-IP one that
        # intermittently 403s with "failed to parse latest release tag".
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          lake-package-directory: crates/almide-perceus-belt

  # ═══════════════════════════════════════════════
  # Checks
  # ═══════════════════════════════════════════════

  checks:
    name: Emit & Format
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: almide-linux
          path: /tmp/almide-bin

      - name: Setup
        run: chmod +x /tmp/almide-bin/almide

      - name: Smoke test - emit targets
        run: |
          ALMIDE=/tmp/almide-bin/almide
          f=$(find spec/lang -name '*_test.almd' | head -1)
          [ -z "$f" ] && echo "No spec files found" && exit 0
          $ALMIDE "$f" --target rust > /dev/null && echo "Rust emit OK"
          $ALMIDE "$f" --emit-ast    > /dev/null && echo "AST emit OK"

      - name: Forbidden impurities (no raw clocks/threads in the compile path)
        run: scripts/check-forbidden-impurities.sh

      - name: WASM runtime oracle-pairing registry (every compile_* registered + verified tests exist)
        run: scripts/check-rt-oracle-registry.sh

      - name: Contract ledger traceability (every contract evidenced, every fixture contracted)
        run: scripts/check-contracts.sh

      - name: Contract README up to date (regenerate and diff)
        run: |
          bash docs/contracts/generate-readme.sh > docs/contracts/README.md
          git diff --exit-code -- docs/contracts/README.md \
            || { echo "::error::docs/contracts/README.md is stale — run: bash docs/contracts/generate-readme.sh > docs/contracts/README.md"; exit 1; }

  # ═══════════════════════════════════════════════
  # Full CI — cross-platform (PRs to main only)
  # ═══════════════════════════════════════════════

  build-cross:
    name: Build (${{ matrix.os }})
    if: github.server_url == 'https://github.com' && github.event_name == 'pull_request' && github.base_ref == 'main'
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: almide-macos
          - os: windows-latest
            artifact: almide-windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-${{ env.RUST_TOOLCHAIN }}-

      - run: cargo build --release

      - name: Install wasmtime
        if: runner.os != 'Windows'
        run: curl https://wasmtime.dev/install.sh -sSf | bash && echo "$HOME/.wasmtime/bin" >> $GITHUB_PATH

      # Keep --test-threads=1 here: this matrix includes windows-latest,
      # where the build-scratch flock is a no-op (#[cfg(unix)]), so parallel
      # `almide` subprocesses could still race the shared scratch dir.
      - run: cargo test -- --test-threads=1

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: target/release/almide${{ matrix.os == 'windows-latest' && '.exe' || '' }}
          retention-days: 1

  test-rust-cross:
    name: Test Rust (${{ matrix.os }})
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    needs: build-cross
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: almide-macos
            binary: /tmp/almide-bin/almide
          - os: windows-latest
            artifact: almide-windows
            binary: almide-bin/almide.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.os == 'windows-latest' && 'almide-bin' || '/tmp/almide-bin' }}

      - name: Setup (Unix)
        if: matrix.os != 'windows-latest'
        run: chmod +x /tmp/almide-bin/almide

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Almide spec tests (Rust target)
        shell: bash
        run: |
          ALMIDE=${{ matrix.binary }}
          $ALMIDE test spec/ --target rust

  # ═══════════════════════════════════════════════
  # Post-merge — trigger playground deploy
  # ═══════════════════════════════════════════════

  trigger-playground:
    name: Trigger Playground Deploy
    # Gate the deploy on host-arch determinism: the playground runs the compiler
    # as wasm32, so a 32/64-bit codegen divergence must block deploy, not ship.
    needs: [test-rust, checks, wasm-host-determinism]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch playground deploy
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: token ${{ secrets.PLAYGROUND_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/almide/playground/dispatches \
            -d '{"event_type":"compiler-updated"}'
