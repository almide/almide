name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build & Test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build almide
        run: cargo build --release

      - name: Smoke test - parse and emit Rust
        run: |
          ./target/release/almide exercises/pangram/pangram.almd --target rust > /dev/null
          echo "Rust emit OK"

      - name: Smoke test - parse and emit TypeScript
        run: |
          ./target/release/almide exercises/pangram/pangram.almd --target ts > /dev/null
          echo "TypeScript emit OK"

      - name: Smoke test - emit AST
        run: |
          ./target/release/almide exercises/pangram/pangram.almd --emit-ast > /dev/null
          echo "AST emit OK"

      - name: Smoke test - run exercise
        run: |
          ./target/release/almide run exercises/pangram/pangram.almd
          echo "Run OK"
