name: Feature Branch CI

# Lightweight CI for agent feature branches.
# Build + cargo test + exercises only. No cross-platform, TS, JS, WASM.

on:
  push:
    branches:
      - '*/[a-z]*'        # dolphin/*, shark/*, octopus/*, squid/*, clownfish/*
      - 'feature/**'
      - 'worktree-*/**'
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - 'LICENSE'
      - '.tasks/**'

# Cancel superseded runs on the same ref so a burst of pushes doesn't fire N
# concurrent runs that all re-download tools and trip the per-IP rate limit.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: "1.89.0"

jobs:
  build-and-test:
    if: github.server_url == 'https://github.com'
    name: Build & Test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: actions/cache@v6
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: feature-cargo-${{ env.RUST_TOOLCHAIN }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: feature-cargo-${{ env.RUST_TOOLCHAIN }}-

      - name: Build
        run: cargo build --release

      - name: Cargo tests
        # Parallel-safe on Unix: the shared build scratch dir is serialized
        # across processes by an advisory flock (src/cli/run.rs BuildDirLock).
        # This runner is ubuntu, so the lock applies. Matches ci.yml.
        run: cargo test

      - name: Run exercises (Rust target)
        continue-on-error: true  # TODO: re-enable after stdlib reconnection
        run: |
          ALMIDE=./target/release/almide
          failed=0; passed=0
          for f in exercises/*/*.almd; do
            case "$f" in *_error_test.almd) continue;; esac
            if $ALMIDE run "$f" 2>&1; then
              passed=$((passed + 1))
            else
              echo "FAIL: $f"
              failed=$((failed + 1))
            fi
          done
          echo "::notice::Rust target: $passed passed, $failed failed"
          [ $failed -eq 0 ]

      - name: Emit check (smoke)
        continue-on-error: true  # TODO: re-enable after stdlib reconnection
        run: |
          ALMIDE=./target/release/almide
          $ALMIDE exercises/pangram/pangram.almd --target rust > /dev/null && echo "Rust emit OK"
          $ALMIDE exercises/pangram/pangram.almd --target ts   > /dev/null && echo "TS emit OK"
