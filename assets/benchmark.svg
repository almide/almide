<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 480" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="almideGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="pythonGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#facc15"/>
      <stop offset="100%" stop-color="#eab308"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="720" height="480" rx="12" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Title -->
  <text x="360" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#111827">Benchmark: Almide vs Python</text>
  <text x="360" y="56" text-anchor="middle" font-size="12" fill="#6b7280">v1 test suite — 11 tests, all passing (100%)</text>

  <!-- ============ Average Time Chart ============ -->
  <text x="200" y="96" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">Average Time (seconds)</text>

  <!-- Y axis -->
  <line x1="80" y1="110" x2="80" y2="300" stroke="#d1d5db" stroke-width="1"/>
  <!-- Grid lines & labels -->
  <line x1="80" y1="300" x2="320" y2="300" stroke="#e5e7eb" stroke-width="0.5" stroke-dasharray="4"/>
  <text x="72" y="304" text-anchor="end" font-size="10" fill="#9ca3af">0</text>
  <line x1="80" y1="262" x2="320" y2="262" stroke="#e5e7eb" stroke-width="0.5" stroke-dasharray="4"/>
  <text x="72" y="266" text-anchor="end" font-size="10" fill="#9ca3af">40</text>
  <line x1="80" y1="224" x2="320" y2="224" stroke="#e5e7eb" stroke-width="0.5" stroke-dasharray="4"/>
  <text x="72" y="228" text-anchor="end" font-size="10" fill="#9ca3af">80</text>
  <line x1="80" y1="186" x2="320" y2="186" stroke="#e5e7eb" stroke-width="0.5" stroke-dasharray="4"/>
  <text x="72" y="190" text-anchor="end" font-size="10" fill="#9ca3af">120</text>
  <line x1="80" y1="148" x2="320" y2="148" stroke="#e5e7eb" stroke-width="0.5" stroke-dasharray="4"/>
  <text x="72" y="152" text-anchor="end" font-size="10" fill="#9ca3af">160</text>
  <line x1="80" y1="110" x2="320" y2="110" stroke="#e5e7eb" stroke-width="0.5" stroke-dasharray="4"/>
  <text x="72" y="114" text-anchor="end" font-size="10" fill="#9ca3af">200</text>

  <!-- Almide bar: 141.4s => height = 141.4 / 200 * 190 = 134.3 -->
  <rect x="120" y="165.7" width="60" height="134.3" rx="4" fill="url(#almideGrad)"/>
  <text x="150" y="158" text-anchor="middle" font-size="13" font-weight="600" fill="#4f46e5">141.4s</text>
  <text x="150" y="320" text-anchor="middle" font-size="12" fill="#374151">Almide</text>

  <!-- Python bar: 44.4s => height = 44.4 / 200 * 190 = 42.2 -->
  <rect x="220" y="257.8" width="60" height="42.2" rx="4" fill="url(#pythonGrad)"/>
  <text x="250" y="251" text-anchor="middle" font-size="13" font-weight="600" fill="#a16207">44.4s</text>
  <text x="250" y="320" text-anchor="middle" font-size="12" fill="#374151">Python</text>

  <!-- ============ Stats Table ============ -->
  <text x="540" y="96" text-anchor="middle" font-size="14" font-weight="600" fill="#374151">Detailed Comparison</text>

  <!-- Table header -->
  <rect x="400" y="110" width="280" height="28" rx="4" fill="#f3f4f6"/>
  <text x="440" y="129" text-anchor="middle" font-size="11" font-weight="600" fill="#6b7280">Metric</text>
  <text x="540" y="129" text-anchor="middle" font-size="11" font-weight="600" fill="#6b7280">Almide</text>
  <text x="640" y="129" text-anchor="middle" font-size="11" font-weight="600" fill="#6b7280">Python</text>

  <!-- Dividers -->
  <line x1="490" y1="112" x2="490" y2="300" stroke="#e5e7eb" stroke-width="0.5"/>
  <line x1="590" y1="112" x2="590" y2="300" stroke="#e5e7eb" stroke-width="0.5"/>

  <!-- Row: Trials -->
  <text x="440" y="157" text-anchor="middle" font-size="11" fill="#374151">Trials</text>
  <text x="540" y="157" text-anchor="middle" font-size="11" fill="#374151">5</text>
  <text x="640" y="157" text-anchor="middle" font-size="11" fill="#374151">2</text>
  <line x1="400" y1="165" x2="680" y2="165" stroke="#f3f4f6" stroke-width="1"/>

  <!-- Row: Avg Time -->
  <text x="440" y="182" text-anchor="middle" font-size="11" fill="#374151">Avg Time</text>
  <text x="540" y="182" text-anchor="middle" font-size="11" font-weight="600" fill="#4f46e5">141.4s</text>
  <text x="640" y="182" text-anchor="middle" font-size="11" font-weight="600" fill="#a16207">44.4s</text>
  <line x1="400" y1="190" x2="680" y2="190" stroke="#f3f4f6" stroke-width="1"/>

  <!-- Row: Pass Rate -->
  <text x="440" y="207" text-anchor="middle" font-size="11" fill="#374151">Pass Rate</text>
  <text x="540" y="207" text-anchor="middle" font-size="11" fill="#16a34a" font-weight="600">100%</text>
  <text x="640" y="207" text-anchor="middle" font-size="11" fill="#16a34a" font-weight="600">100%</text>
  <line x1="400" y1="215" x2="680" y2="215" stroke="#f3f4f6" stroke-width="1"/>

  <!-- Row: Avg LOC -->
  <text x="440" y="232" text-anchor="middle" font-size="11" fill="#374151">Avg LOC</text>
  <text x="540" y="232" text-anchor="middle" font-size="11" fill="#374151">119.2</text>
  <text x="640" y="232" text-anchor="middle" font-size="11" fill="#374151">107.5</text>
  <line x1="400" y1="240" x2="680" y2="240" stroke="#f3f4f6" stroke-width="1"/>

  <!-- Row: Avg Turns -->
  <text x="440" y="257" text-anchor="middle" font-size="11" fill="#374151">Avg Turns</text>
  <text x="540" y="257" text-anchor="middle" font-size="11" fill="#374151">7.4</text>
  <text x="640" y="257" text-anchor="middle" font-size="11" fill="#6b7280">—</text>
  <line x1="400" y1="265" x2="680" y2="265" stroke="#f3f4f6" stroke-width="1"/>

  <!-- Row: Avg Cost -->
  <text x="440" y="282" text-anchor="middle" font-size="11" fill="#374151">Avg Cost</text>
  <text x="540" y="282" text-anchor="middle" font-size="11" fill="#374151">$0.374</text>
  <text x="640" y="282" text-anchor="middle" font-size="11" fill="#6b7280">—</text>

  <!-- Table border -->
  <rect x="400" y="110" width="280" height="190" rx="4" fill="none" stroke="#e5e7eb" stroke-width="1"/>

  <!-- ============ Bottom Notes ============ -->
  <rect x="40" y="350" width="640" height="56" rx="8" fill="#eef2ff" stroke="#c7d2fe" stroke-width="1"/>
  <circle cx="66" cy="378" r="12" fill="#6366f1"/>
  <text x="60.5" y="383" text-anchor="middle" font-size="14" fill="white" font-weight="700">*</text>
  <text x="88" y="372" font-size="12" font-weight="600" fill="#4338ca">Almide uses zero training data.</text>
  <text x="88" y="390" font-size="11" fill="#6366f1">All code is generated from scratch via LLM agent loop — no fine-tuning, no few-shot examples, no cached solutions.</text>

  <!-- Footer -->
  <text x="360" y="436" text-anchor="middle" font-size="10" fill="#9ca3af">v1 test suite · 11 tests · measured on identical task specifications</text>
  <text x="360" y="452" text-anchor="middle" font-size="10" fill="#9ca3af">Python timings are pure execution; Almide timings include full agent reasoning + code generation</text>
</svg>
