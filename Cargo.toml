[package]
name = "almide"
version = "0.9.10"
edition = "2024"
license = "MIT OR Apache-2.0"

[dependencies]
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
semver = "1"
toml = "0.8"
wasm-encoder = "0.225"
lasso = { version = "0.7", features = ["multi-threaded"] }

[dev-dependencies]
proptest = "1"

[build-dependencies]
toml = "0.8"
serde = { version = "1", features = ["derive"] }
