[trim]
description = "Remove leading and trailing whitespace."
example = 'string.trim("  hello  ") // => "hello"'
params = [{ name = "s", type = "String" }]
return = "String"
rust = "almide_rt_string_trim(&*{s})"
ts = "__almd_string.trim({s})"

[split]
description = "Split a string by separator into a list of substrings."
example = 'string.split("a,b,c", ",") // => ["a", "b", "c"]'
params = [{ name = "s", type = "String" }, { name = "sep", type = "String" }]
return = "List[String]"
rust = "almide_rt_string_split(&*{s}, &*{sep})"
ts = "__almd_string.split({s}, {sep})"

[join]
description = "Join a list of strings with a separator."
example = 'string.join(["a", "b", "c"], "-") // => "a-b-c"'
params = [{ name = "list", type = "List[String]" }, { name = "sep", type = "String" }]
return = "String"
rust = "almide_rt_string_join(&{list}, &*{sep})"
ts = "__almd_string.join({list}, {sep})"

[len]
description = "Return the number of characters in a string."
example = 'string.len("hello") // => 5'
params = [{ name = "s", type = "String" }]
return = "Int"
rust = "almide_rt_string_len(&*{s})"
ts = "__almd_string.len({s})"

