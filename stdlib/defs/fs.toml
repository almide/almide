[read_text]
description = "Read file contents as a UTF-8 string"
example = 'let text = fs.read_text("config.toml")'
params = [{ name = "path", type = "String" }]
return = "Result[String, String]"
effect = true
rust = "almide_rt_fs_read_text(&*{path})?"
ts = "__almd_fs.read_text({path})"

[read_bytes]
description = "Read file contents as a list of bytes"
example = 'let bytes = fs.read_bytes("image.png")'
params = [{ name = "path", type = "String" }]
return = "Result[List[Int], String]"
effect = true
rust = "almide_rt_fs_read_bytes(&*{path})?"
ts = "__almd_fs.read_bytes({path})"

[write]
description = "Write a string to a file, creating or overwriting it"
example = 'fs.write("output.txt", "hello")'
params = [{ name = "path", type = "String" }, { name = "content", type = "String" }]
return = "Result[Unit, String]"
effect = true
rust = "almide_rt_fs_write(&*{path}, &*{content})?"
ts = "__almd_fs.write({path}, {content})"

[write_bytes]
description = "Write a list of bytes to a file"
example = 'fs.write_bytes("out.bin", [0, 1, 2])'
params = [{ name = "path", type = "String" }, { name = "bytes", type = "List[Int]" }]
return = "Result[Unit, String]"
effect = true
rust = "almide_rt_fs_write_bytes(&*{path}, &{bytes})?"
ts = "__almd_fs.write_bytes({path}, {bytes})"

