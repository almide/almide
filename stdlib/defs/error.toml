[context]
description = "Add context message to an error result."
example = 'error.context(result, "failed to load config")'
type_params = ["T", "E"]
params = [
    { name = "r", type = "Result[T, E]" },
    { name = "msg", type = "String" },
]
return = "Result[T, String]"
rust = "almide_rt_error_context({r}, &*{msg})"
ts = "{r}"

[message]
description = "Extract the error message from a Result, or empty string if ok."
example = 'error.message(err("oops")) // => "oops"'
type_params = ["T"]
params = [{ name = "r", type = "Result[T, String]" }]
return = "String"
rust = "almide_rt_error_message({r})"
ts = "__almd_error.message({r})"

[chain]
description = "Chain two error messages with a cause separator."
example = 'error.chain("load failed", "file not found") // => "load failed: file not found"'
params = [
    { name = "outer", type = "String" },
    { name = "cause", type = "String" },
]
return = "String"
rust = "almide_rt_error_chain(&*{outer}, &*{cause})"
ts = "__almd_error.chain({outer}, {cause})"
