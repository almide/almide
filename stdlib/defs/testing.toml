[assert_throws]
description = "Assert that a function throws an error containing the expected message."
example = 'testing.assert_throws(fn() => panic("oh no"), "oh no")'
params = [{ name = "f", type = "fn() -> Unit" }, { name = "expected", type = "String" }]
return = "Unit"
rust = "almide_rt_test_assert_throws({f}, &*{expected})"
ts = "__almd_testing.assert_throws({f}, {expected})"

[assert_contains]
description = "Assert that a string contains a substring."
example = 'testing.assert_contains("hello world", "world")'
params = [{ name = "haystack", type = "String" }, { name = "needle", type = "String" }]
return = "Unit"
rust = "almide_rt_test_assert_contains(&*{haystack}, &*{needle})"
ts = "__almd_testing.assert_contains({haystack}, {needle})"

[assert_approx]
description = "Assert two floats are approximately equal within tolerance."
example = 'testing.assert_approx(3.14, 3.14159, 0.01)'
params = [{ name = "a", type = "Float" }, { name = "b", type = "Float" }, { name = "tolerance", type = "Float" }]
return = "Unit"
rust = "almide_rt_test_assert_approx({a}, {b}, {tolerance})"
ts = "__almd_testing.assert_approx({a}, {b}, {tolerance})"

[assert_gt]
description = "Assert that a is greater than b."
example = 'testing.assert_gt(10, 5)'
params = [{ name = "a", type = "Int" }, { name = "b", type = "Int" }]
return = "Unit"
rust = "almide_rt_test_assert_gt({a}, {b})"
ts = "__almd_testing.assert_gt({a}, {b})"

[assert_lt]
description = "Assert that a is less than b."
example = 'testing.assert_lt(3, 7)'
params = [{ name = "a", type = "Int" }, { name = "b", type = "Int" }]
return = "Unit"
rust = "almide_rt_test_assert_lt({a}, {b})"
ts = "__almd_testing.assert_lt({a}, {b})"

[assert_some]
description = "Assert that an Option is some (not none)."
example = 'testing.assert_some(some("value"))'
params = [{ name = "opt", type = "Option[String]" }]
return = "Unit"
rust = "almide_rt_test_assert_some(&{opt})"
ts = "__almd_testing.assert_some({opt})"

[assert_ok]
description = "Assert that a Result is ok (not err)."
example = 'testing.assert_ok(ok("success"))'
params = [{ name = "result", type = "Result[String, String]" }]
return = "Unit"
rust = "almide_rt_test_assert_ok(&{result})"
ts = "__almd_testing.assert_ok({result})"
