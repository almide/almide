return = "List[Float]"
rust = "almide_rt_bytes_read_f64_le_array(&{b}, {pos}, {count})"

[read_f32_le_array]
description = "Read `count` consecutive little-endian f32 values starting at `pos` as a List[Float]. One native call vs. `count` Almide-side reads."
params = [{ name = "b", type = "Bytes" }, { name = "pos", type = "Int" }, { name = "count", type = "Int" }]
return = "List[Float]"
rust = "almide_rt_bytes_read_f32_le_array(&{b}, {pos}, {count})"

[read_f16_le_array]
description = "Read `count` consecutive IEEE-754 half-precision (f16 little-endian) values starting at `pos`, expanded to f64, as a List[Float]."
params = [{ name = "b", type = "Bytes" }, { name = "pos", type = "Int" }, { name = "count", type = "Int" }]
return = "List[Float]"
rust = "almide_rt_bytes_read_f16_le_array(&{b}, {pos}, {count})"
