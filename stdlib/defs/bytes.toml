[len]
description = "Return the number of bytes."
example = 'bytes.len(b) // => 3'
params = [{ name = "b", type = "Bytes" }]
return = "Int"
rust = "almide_rt_bytes_len(&{b})"
ts = "__almd_bytes.len({b})"

[get]
description = "Get a byte value (0-255) at an index."
example = 'bytes.get(b, 0) // => some(72)'
params = [{ name = "b", type = "Bytes" }, { name = "i", type = "Int" }]
return = "Option[Int]"
rust = "almide_rt_bytes_get(&{b}, {i})"
ts = "__almd_bytes.get({b}, {i})"

[get_or]
description = "Get a byte value at an index, or a default if out of bounds."
example = 'bytes.get_or(b, 0, 0) // => 72'
params = [{ name = "b", type = "Bytes" }, { name = "i", type = "Int" }, { name = "default", type = "Int" }]
return = "Int"
rust = "almide_rt_bytes_get_or(&{b}, {i}, {default})"
ts = "__almd_bytes.get_or({b}, {i}, {default})"

[set]
description = "Set a byte value at an index (mutates in place for var bindings)."
example = 'bytes.set(b, 0, 255)'
params = [{ name = "b", type = "Bytes" }, { name = "i", type = "Int" }, { name = "val", type = "Int" }]
return = "Bytes"
rust = "almide_rt_bytes_set({b}, {i}, {val})"
ts = "__almd_bytes.set({b}, {i}, {val})"

[slice]
description = "Extract a sub-range of bytes [start, end)."
example = 'bytes.slice(b, 1, 3)'
params = [{ name = "b", type = "Bytes" }, { name = "start", type = "Int" }, { name = "end", type = "Int" }]
return = "Bytes"
rust = "almide_rt_bytes_slice(&{b}, {start}, {end})"
ts = "__almd_bytes.slice({b}, {start}, {end})"

[from_list]
description = "Create Bytes from a list of integers (each masked to 0-255)."
example = 'bytes.from_list([72, 105]) // => <bytes>'
params = [{ name = "xs", type = "List[Int]" }]
return = "Bytes"
rust = "almide_rt_bytes_from_list(&{xs})"
ts = "__almd_bytes.from_list({xs})"

[to_list]
description = "Convert Bytes to a list of integers (0-255)."
example = 'bytes.to_list(b) // => [72, 105]'
params = [{ name = "b", type = "Bytes" }]
return = "List[Int]"
rust = "almide_rt_bytes_to_list(&{b})"
ts = "__almd_bytes.to_list({b})"

[is_empty]
description = "Check if byte buffer is empty."
example = 'bytes.is_empty?([]) // => true'
params = [{ name = "b", type = "Bytes" }]
return = "Bool"
rust = "almide_rt_bytes_is_empty(&{b})"
ts = "__almd_bytes.is_empty({b})"

[concat]
description = "Concatenate two byte buffers."
example = 'bytes.concat(a, b)'
params = [{ name = "a", type = "Bytes" }, { name = "b", type = "Bytes" }]
return = "Bytes"
rust = "almide_rt_bytes_concat(&{a}, &{b})"
ts = "__almd_bytes.concat({a}, {b})"

[repeat]
description = "Repeat a byte buffer n times."
example = 'bytes.repeat(b, 3)'
params = [{ name = "b", type = "Bytes" }, { name = "n", type = "Int" }]
return = "Bytes"
rust = "almide_rt_bytes_repeat(&{b}, {n})"
ts = "__almd_bytes.repeat({b}, {n})"

[new]
description = "Create a zero-filled byte buffer of given length."
example = 'bytes.new(1024) // => <1024 zero bytes>'
params = [{ name = "len", type = "Int" }]
return = "Bytes"
rust = "almide_rt_bytes_new({len})"
ts = "__almd_bytes.new_bytes({len})"

[push]
description = "Append a single byte (0-255) to the buffer (mutates in place)."
example = 'bytes.push(buf, 65)'
params = [{ name = "b", type = "Bytes" }, { name = "val", type = "Int" }]
return = "Unit"
rust = "almide_rt_bytes_push(&mut {b}, {val})"

[clear]
description = "Remove all bytes from the buffer (mutates in place, keeps capacity)."
example = 'bytes.clear(buf)'
params = [{ name = "b", type = "Bytes" }]
return = "Unit"
rust = "almide_rt_bytes_clear(&mut {b})"

[reverse]
description = "Return a new Bytes with the bytes in reverse order."
example = 'bytes.reverse(b)'
params = [{ name = "b", type = "Bytes" }]
return = "Bytes"
rust = "almide_rt_bytes_reverse(&{b})"

[fill]
description = "Overwrite every byte in `b` with `val` (truncated to u8). Mutates in place; returns Unit."
example = 'bytes.fill(buf, 0)'
params = [{ name = "b", type = "Bytes" }, { name = "val", type = "Int" }]
return = "Unit"
rust = "almide_rt_bytes_fill(&mut {b}, {val})"

[map_each]
description = "Apply a per-byte function to every element and return a new Bytes."
example = 'bytes.map_each(b, (x) => x + 1)'
params = [{ name = "b", type = "Bytes" }, { name = "f", type = "fn(Int) -> Int" }]
return = "Bytes"
rust = "almide_rt_bytes_map_each(&{b}, {f})"

[insert]
description = "Return a new Bytes with `val` inserted at `pos`. Out-of-range `pos` clamps to `[0, len(b)]`."
example = 'bytes.insert(b, 2, 0xFF)'
params = [{ name = "b", type = "Bytes" }, { name = "pos", type = "Int" }, { name = "val", type = "Int" }]
return = "Bytes"
rust = "almide_rt_bytes_insert(&{b}, {pos}, {val})"

[remove_at]
description = "Return a new Bytes with the byte at `pos` removed. Out-of-range `pos` returns the original buffer unchanged."
example = 'bytes.remove_at(b, 0)'
params = [{ name = "b", type = "Bytes" }, { name = "pos", type = "Int" }]
return = "Bytes"
rust = "almide_rt_bytes_remove_at(&{b}, {pos})"

[chunks]
description = "Split `b` into a list of fresh Bytes of length `size` each. The last chunk may be shorter."
example = 'bytes.chunks(b, 16)'
params = [{ name = "b", type = "Bytes" }, { name = "size", type = "Int" }]
return = "List[Bytes]"
rust = "almide_rt_bytes_chunks(&{b}, {size})"

[split]
description = "Split `b` on every occurrence of `sep` (as a Bytes pattern). Empty `sep` returns `[b]`."
example = 'bytes.split(b, bytes.from_string(\",\"))'
params = [{ name = "b", type = "Bytes" }, { name = "sep", type = "Bytes" }]
return = "List[Bytes]"
rust = "almide_rt_bytes_split(&{b}, &{sep})"

[lines]
description = "Split `b` on `0x0A` (LF). A trailing newline produces no extra empty element. `\\r\\n` keeps the `\\r` (use `string.lines` for trimmed text lines)."
example = 'bytes.lines(b)'
params = [{ name = "b", type = "Bytes" }]
return = "List[Bytes]"
rust = "almide_rt_bytes_lines(&{b})"

[contains]
description = "True if `pattern` appears as a contiguous subsequence of `b`."
example = 'bytes.contains(b, bytes.from_string("HTTP"))'
params = [{ name = "b", type = "Bytes" }, { name = "pattern", type = "Bytes" }]
return = "Bool"
rust = "almide_rt_bytes_contains(&{b}, &{pattern})"

[index_of]
description = "Return the byte offset of the first occurrence of `pattern` in `b`, or `none`."
example = 'bytes.index_of(b, bytes.from_string("X"))'
params = [{ name = "b", type = "Bytes" }, { name = "pattern", type = "Bytes" }]
return = "Option[Int]"
rust = "almide_rt_bytes_index_of(&{b}, &{pattern})"

[starts_with]
description = "True if `b` begins with the `prefix` byte sequence."
example = 'bytes.starts_with(b, bytes.from_string("\\x7fELF"))'
params = [{ name = "b", type = "Bytes" }, { name = "prefix", type = "Bytes" }]
return = "Bool"
rust = "almide_rt_bytes_starts_with(&{b}, &{prefix})"

[ends_with]
description = "True if `b` ends with the `suffix` byte sequence."
example = 'bytes.ends_with(b, bytes.from_string(".png"))'
params = [{ name = "b", type = "Bytes" }, { name = "suffix", type = "Bytes" }]
return = "Bool"
rust = "almide_rt_bytes_ends_with(&{b}, &{suffix})"

[cmp]
description = "Lexicographic byte comparison: returns `-1` if `a < b`, `0` if equal, `+1` if `a > b`. Useful for sort_by."
example = 'bytes.cmp(a, b)'
params = [{ name = "a", type = "Bytes" }, { name = "b", type = "Bytes" }]
return = "Int"
rust = "almide_rt_bytes_cmp(&{a}, &{b})"

[from_string]
description = "Convert a string to its UTF-8 byte representation."
example = 'bytes.from_string("Hello") // => <72, 101, 108, 108, 111>'
params = [{ name = "s", type = "String" }]
return = "Bytes"
rust = "almide_rt_bytes_from_string(&*{s})"

[to_string]
description = "Decode bytes as UTF-8. Returns `err` on invalid sequences. Strict counterpart of `to_string_lossy`."
example = 'bytes.to_string(b)'
params = [{ name = "b", type = "Bytes" }]
return = "Result[String, String]"
rust = "almide_rt_bytes_to_string(&{b})"

[to_string_lossy]
description = "Decode bytes as UTF-8, replacing invalid sequences with U+FFFD (REPLACEMENT CHARACTER). Always succeeds."
example = 'bytes.to_string_lossy(b)'
params = [{ name = "b", type = "Bytes" }]
return = "String"
rust = "almide_rt_bytes_to_string_lossy(&{b})"

[is_valid_utf8]
description = "Check whether the buffer contains valid UTF-8 (without decoding)."
example = 'if bytes.is_valid_utf8(b) then ...'
params = [{ name = "b", type = "Bytes" }]
return = "Bool"
rust = "almide_rt_bytes_is_valid_utf8(&{b})"

