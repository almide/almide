# ── Cursor family ──
# Immutable cursor as `(next_pos, Option[T])` tuple. Each read advances the
# logical position via the returned `Int` — no shared mutable state needed.
# Out-of-bounds returns `(pos, none)` (pos unchanged), so callers can stop
# parsing on the first miss.

[skip]
description = "Advance a cursor position by `n` bytes. Returns `min(pos + n, len)`."
example = 'let p1 = bytes.skip(b, p0, 4)'
params = [{ name = "b", type = "Bytes" }, { name = "pos", type = "Int" }, { name = "n", type = "Int" }]
return = "Int"
rust = "almide_rt_bytes_skip(&{b}, {pos}, {n})"

[eof]
description = "True if `pos >= bytes.len(b)`."
example = 'if bytes.eof(b, pos) then ...'
params = [{ name = "b", type = "Bytes" }, { name = "pos", type = "Int" }]
return = "Bool"
rust = "almide_rt_bytes_eof(&{b}, {pos})"

[read_u8_at]
description = "Cursor read: u8 at `pos`. Returns `(new_pos, Option[Int])`."
params = [{ name = "b", type = "Bytes" }, { name = "pos", type = "Int" }]
return = "(Int, Option[Int])"
rust = "almide_rt_bytes_read_u8_at(&{b}, {pos})"

[read_u16_le_at]
description = "Cursor read: u16 little-endian at `pos`. Returns `(new_pos, Option[Int])`."
