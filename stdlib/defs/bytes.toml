[len]
description = "Return the number of bytes."
example = 'bytes.len(b) // => 3'
params = [{ name = "b", type = "Bytes" }]
return = "Int"
rust = "almide_rt_bytes_len(&{b})"
ts = "__almd_bytes.len({b})"

[get]
description = "Get a byte value (0-255) at an index."
example = 'bytes.get(b, 0) // => some(72)'
params = [{ name = "b", type = "Bytes" }, { name = "i", type = "Int" }]
return = "Option[Int]"
rust = "almide_rt_bytes_get(&{b}, {i})"
ts = "__almd_bytes.get({b}, {i})"

[get_or]
description = "Get a byte value at an index, or a default if out of bounds."
example = 'bytes.get_or(b, 0, 0) // => 72'
params = [{ name = "b", type = "Bytes" }, { name = "i", type = "Int" }, { name = "default", type = "Int" }]
return = "Int"
rust = "almide_rt_bytes_get_or(&{b}, {i}, {default})"
ts = "__almd_bytes.get_or({b}, {i}, {default})"

[set]
description = "Set a byte value at an index (mutates in place for var bindings)."
example = 'bytes.set(b, 0, 255)'
params = [{ name = "b", type = "Bytes" }, { name = "i", type = "Int" }, { name = "val", type = "Int" }]
return = "Bytes"
rust = "almide_rt_bytes_set({b}, {i}, {val})"
ts = "__almd_bytes.set({b}, {i}, {val})"

[slice]
description = "Extract a sub-range of bytes [start, end)."
example = 'bytes.slice(b, 1, 3)'
params = [{ name = "b", type = "Bytes" }, { name = "start", type = "Int" }, { name = "end", type = "Int" }]
return = "Bytes"
rust = "almide_rt_bytes_slice(&{b}, {start}, {end})"
ts = "__almd_bytes.slice({b}, {start}, {end})"

[from_list]
description = "Create Bytes from a list of integers (each masked to 0-255)."
example = 'bytes.from_list([72, 105]) // => <bytes>'
params = [{ name = "xs", type = "List[Int]" }]
return = "Bytes"
rust = "almide_rt_bytes_from_list(&{xs})"
ts = "__almd_bytes.from_list({xs})"

[to_list]
description = "Convert Bytes to a list of integers (0-255)."
example = 'bytes.to_list(b) // => [72, 105]'
params = [{ name = "b", type = "Bytes" }]
return = "List[Int]"
rust = "almide_rt_bytes_to_list(&{b})"
ts = "__almd_bytes.to_list({b})"

[is_empty]
description = "Check if byte buffer is empty."
example = 'bytes.is_empty?([]) // => true'
params = [{ name = "b", type = "Bytes" }]
return = "Bool"
rust = "almide_rt_bytes_is_empty(&{b})"
ts = "__almd_bytes.is_empty({b})"

[concat]
description = "Concatenate two byte buffers."
example = 'bytes.concat(a, b)'
params = [{ name = "a", type = "Bytes" }, { name = "b", type = "Bytes" }]
return = "Bytes"
rust = "almide_rt_bytes_concat(&{a}, &{b})"
ts = "__almd_bytes.concat({a}, {b})"

[repeat]
description = "Repeat a byte buffer n times."
example = 'bytes.repeat(b, 3)'
params = [{ name = "b", type = "Bytes" }, { name = "n", type = "Int" }]
return = "Bytes"
rust = "almide_rt_bytes_repeat(&{b}, {n})"
ts = "__almd_bytes.repeat({b}, {n})"

[new]
description = "Create a zero-filled byte buffer of given length."
example = 'bytes.new(1024) // => <1024 zero bytes>'
params = [{ name = "len", type = "Int" }]
return = "Bytes"
rust = "almide_rt_bytes_new({len})"
ts = "__almd_bytes.new_bytes({len})"

[push]
description = "Append a single byte (0-255) to the buffer (mutates in place)."
example = 'bytes.push(buf, 65)'
params = [{ name = "b", type = "Bytes" }, { name = "val", type = "Int" }]
return = "Unit"
rust = "almide_rt_bytes_push(&mut {b}, {val})"

[clear]
description = "Remove all bytes from the buffer (mutates in place, keeps capacity)."
example = 'bytes.clear(buf)'
params = [{ name = "b", type = "Bytes" }]
return = "Unit"
rust = "almide_rt_bytes_clear(&mut {b})"

[from_string]
description = "Convert a string to its UTF-8 byte representation."
example = 'bytes.from_string("Hello") // => <72, 101, 108, 108, 111>'
params = [{ name = "s", type = "String" }]
return = "Bytes"
rust = "almide_rt_bytes_from_string(&*{s})"

# ── Bridge protocol: big-endian pack/unpack ──

[write_i64_be]
description = "Append an Int as 8 bytes big-endian."
params = [{ name = "b", type = "Bytes" }, { name = "val", type = "Int" }]
return = "Unit"
rust = "almide_rt_bytes_write_i64_be(&mut {b}, {val})"

[write_f64_be]
description = "Append a Float as 8 bytes big-endian."
params = [{ name = "b", type = "Bytes" }, { name = "val", type = "Float" }]
return = "Unit"
rust = "almide_rt_bytes_write_f64_be(&mut {b}, {val})"

[write_u32_be]
description = "Append an Int as 4 bytes big-endian (u32)."
params = [{ name = "b", type = "Bytes" }, { name = "val", type = "Int" }]
return = "Unit"
rust = "almide_rt_bytes_write_u32_be(&mut {b}, {val})"

[write_u8]
description = "Append a single byte."
params = [{ name = "b", type = "Bytes" }, { name = "val", type = "Int" }]
return = "Unit"
rust = "almide_rt_bytes_write_u8(&mut {b}, {val})"

[write_string_be]
description = "Append a length-prefixed UTF-8 string (u32 length + bytes)."
params = [{ name = "b", type = "Bytes" }, { name = "s", type = "String" }]
return = "Unit"
rust = "almide_rt_bytes_write_string_be(&mut {b}, &*{s})"

[write_bool]
description = "Append a boolean as 1 byte (0 or 1)."
params = [{ name = "b", type = "Bytes" }, { name = "val", type = "Bool" }]
return = "Unit"
rust = "almide_rt_bytes_write_bool(&mut {b}, {val})"

[read_i64_be]
description = "Read an Int from 8 bytes big-endian at position."
params = [{ name = "b", type = "Bytes" }, { name = "pos", type = "Int" }]
return = "Int"
rust = "almide_rt_bytes_read_i64_be(&{b}, {pos})"

[read_f64_be]
description = "Read a Float from 8 bytes big-endian at position."
params = [{ name = "b", type = "Bytes" }, { name = "pos", type = "Int" }]
return = "Float"
rust = "almide_rt_bytes_read_f64_be(&{b}, {pos})"

[read_u32_be]
description = "Read an Int from 4 bytes big-endian (u32) at position."
params = [{ name = "b", type = "Bytes" }, { name = "pos", type = "Int" }]
return = "Int"
rust = "almide_rt_bytes_read_u32_be(&{b}, {pos})"

[read_u8]
description = "Read a single byte at position."
params = [{ name = "b", type = "Bytes" }, { name = "pos", type = "Int" }]
return = "Int"
rust = "almide_rt_bytes_read_u8(&{b}, {pos})"

[read_bool]
description = "Read a boolean from 1 byte at position."
params = [{ name = "b", type = "Bytes" }, { name = "pos", type = "Int" }]
return = "Bool"
rust = "almide_rt_bytes_read_bool(&{b}, {pos})"

[read_string_be]
description = "Read a length-prefixed UTF-8 string at position."
params = [{ name = "b", type = "Bytes" }, { name = "pos", type = "Int" }]
return = "String"
rust = "almide_rt_bytes_read_string_be(&{b}, {pos})"

[as_ptr]
description = "Get raw pointer to buffer data (for C FFI)."
params = [{ name = "b", type = "Bytes" }]
return = "RawPtr"
rust = "almide_rt_bytes_as_ptr(&{b})"

[as_mut_ptr]
description = "Get mutable raw pointer to buffer data (for C FFI)."
params = [{ name = "b", type = "Bytes" }]
return = "RawPtr"
rust = "almide_rt_bytes_as_mut_ptr(&mut {b})"

[from_raw_ptr]
description = "Create Bytes from a raw pointer and length (unsafe, for C FFI bridge callee)."
params = [{ name = "ptr", type = "RawPtr" }, { name = "len", type = "Int" }]
return = "Bytes"
rust = "almide_rt_bytes_from_raw_ptr({ptr}, {len})"

[copy_to_ptr]
description = "Copy Bytes to a raw pointer. Returns bytes written."
params = [{ name = "b", type = "Bytes" }, { name = "ptr", type = "RawPtr" }, { name = "cap", type = "Int" }]
return = "Int"
rust = "almide_rt_bytes_copy_to_ptr(&{b}, {ptr}, {cap})"

# ── In-place little-endian writes & data pointer ──

[set_f32_le]
description = "Write a Float as f32 little-endian at position pos."
params = [{ name = "b", type = "Bytes" }, { name = "pos", type = "Int" }, { name = "val", type = "Float" }]
return = "Unit"
rust = "almide_rt_bytes_set_f32_le(&mut {b}, {pos}, {val})"

[set_u16_le]
description = "Write an Int as u16 little-endian at position pos."
params = [{ name = "b", type = "Bytes" }, { name = "pos", type = "Int" }, { name = "val", type = "Int" }]
return = "Unit"
rust = "almide_rt_bytes_set_u16_le(&mut {b}, {pos}, {val})"

[data_ptr]
description = "Return the data pointer (after the 4-byte length prefix) as Int."
params = [{ name = "b", type = "Bytes" }]
return = "Int"
rust = "almide_rt_bytes_data_ptr(&{b})"
