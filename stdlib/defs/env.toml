[unix_timestamp]
params = []
return = "Int"
effect = true
rust = "almide_rt_env_unix_timestamp()"
ts = "__almd_env.unix_timestamp()"

[args]
params = []
return = "List[String]"
effect = true
rust = "almide_rt_env_args()"
ts = "__almd_env.args()"

[get]
params = [{ name = "name", type = "String" }]
return = "Option[String]"
effect = true
rust = "almide_rt_env_get(&*{name})"
ts = "__almd_env.get({name})"

[set]
params = [{ name = "name", type = "String" }, { name = "value", type = "String" }]
return = "Unit"
effect = true
rust = "almide_rt_env_set(&*{name}, &*{value})"
ts = "__almd_env.set({name}, {value})"

[cwd]
params = []
return = "Result[String, String]"
effect = true
rust = "almide_rt_env_cwd()?"
ts = "__almd_env.cwd()"

[millis]
params = []
return = "Int"
effect = true
rust = "almide_rt_env_millis()"
ts = "__almd_env.millis()"

[sleep_ms]
params = [{ name = "ms", type = "Int" }]
return = "Unit"
effect = true
rust = "almide_rt_env_sleep_ms({ms})"
ts = "__almd_env.sleep_ms({ms})"

[temp_dir]
params = []
return = "String"
effect = true
rust = "std::env::temp_dir().to_string_lossy().to_string()"
ts = "__almd_env.temp_dir()"
