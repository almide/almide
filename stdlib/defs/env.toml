[unix_timestamp]
description = "Get the current Unix timestamp in seconds."
example = 'let ts = env.unix_timestamp()'
params = []
return = "Int"
effect = true
rust = "almide_rt_env_unix_timestamp()"
ts = "__almd_env.unix_timestamp()"

[args]
description = "Get the command-line arguments as a list of strings."
example = 'let args = env.args()'
params = []
return = "List[String]"
effect = true
rust = "almide_rt_env_args()"
ts = "__almd_env.args()"

[get]
description = "Get the value of an environment variable, or none if not set."
example = 'env.get("HOME") // => some("/Users/alice")'
params = [{ name = "name", type = "String" }]
return = "Option[String]"
effect = true
rust = "almide_rt_env_get(&*{name})"
ts = "__almd_env.get({name})"

[set]
description = "Set an environment variable."
example = 'env.set("MY_VAR", "hello")'
params = [{ name = "name", type = "String" }, { name = "value", type = "String" }]
return = "Unit"
effect = true
rust = "almide_rt_env_set(&*{name}, &*{value})"
ts = "__almd_env.set({name}, {value})"

[cwd]
description = "Get the current working directory."
example = 'let dir = env.cwd()'
params = []
return = "Result[String, String]"
effect = true
rust = "almide_rt_env_cwd()?"
ts = "__almd_env.cwd()"

[millis]
description = "Get the current time in milliseconds since epoch."
example = 'let ms = env.millis()'
params = []
return = "Int"
effect = true
rust = "almide_rt_env_millis()"
ts = "__almd_env.millis()"

[sleep_ms]
description = "Sleep for the given number of milliseconds."
example = 'env.sleep_ms(1000) // sleep 1 second'
params = [{ name = "ms", type = "Int" }]
return = "Unit"
effect = true
rust = "almide_rt_env_sleep_ms({ms})"
ts = "__almd_env.sleep_ms({ms})"

[temp_dir]
description = "Get the system temporary directory path."
example = 'let tmp = env.temp_dir()'
params = []
return = "String"
effect = true
rust = "almide_rt_env_temp_dir()"
ts = "__almd_env.temp_dir()"

[os]
description = "Get the operating system name (linux, macos, windows)."
example = 'env.os() // => "macos"'
params = []
return = "String"
rust = "almide_rt_env_os().to_string()"
ts = "__almd_env.os()"
