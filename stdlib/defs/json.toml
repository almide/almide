ts = "__almd_json.stringify_pretty({j})"

# ── Builder shortcuts ──────────────────────────────────────────────

[object]
params = [{ name = "entries", type = "List[(String, Json)]" }]
return = "Json"
rust = "almide_json_object({entries})"
ts = "__almd_json.object({entries})"

[s]
params = [{ name = "v", type = "String" }]
return = "Json"
rust = "JStr({v})"
ts = "__almd_json.from_string({v})"

[i]
params = [{ name = "v", type = "Int" }]
return = "Json"
rust = "JInt({v})"
ts = "__almd_json.from_int({v})"

[f]
params = [{ name = "v", type = "Float" }]
return = "Json"
rust = "almide_json_from_float({v})"
ts = "__almd_json.from_float({v})"

[b]
params = [{ name = "v", type = "Bool" }]
return = "Json"
rust = "JBool({v})"
ts = "__almd_json.from_bool({v})"

