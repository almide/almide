[parse]
description = "Parse a JSON string into a Value."
example = 'let v = json.parse("{\"name\": \"Alice\"}")'
params = [{ name = "text", type = "String" }]
return = "Result[Value, String]"
rust = "almide_rt_json_parse({text})"
ts = "__almd_json.parse({text})"

[stringify]
description = "Convert a Value to a JSON string."
example = 'json.stringify(person.encode())'
params = [{ name = "v", type = "Value" }]
return = "String"
rust = "almide_rt_json_stringify({v})"
ts = "__almd_json.stringify({v})"

[get]
description = "Get a nested value by key. Returns none if key doesn't exist."
example = 'json.get(j, "name")'
params = [{ name = "j", type = "Value" }, { name = "key", type = "String" }]
return = "Option[Value]"
rust = "almide_json_get(&{j}, &{key})"
ts = "__almd_json.get({j}, {key})"

[keys]
description = "Get all keys of a JSON object as a list of strings."
example = 'json.keys(j)'
params = [{ name = "j", type = "Value" }]
return = "List[String]"
rust = "almide_json_keys(&{j})"
ts = "__almd_json.keys({j})"

[from_string]
description = "Create a Json string value."
example = 'json.from_string("hello")'
params = [{ name = "s", type = "String" }]
return = "Value"
rust = "Value::Str({s})"
ts = "__almd_json.from_string({s})"

[from_int]
description = "Create a Json integer value."
example = 'json.from_int(42)'
params = [{ name = "n", type = "Int" }]
return = "Value"
rust = "Value::Int({n})"
ts = "__almd_json.from_int({n})"

[from_bool]
description = "Create a Json boolean value."
example = 'json.from_bool(true)'
params = [{ name = "b", type = "Bool" }]
return = "Value"
rust = "Value::Bool({b})"
ts = "__almd_json.from_bool({b})"

[null]
description = "Create a Json null value."
example = 'json.null()'
params = []
return = "Value"
rust = "almide_rt_value_null()"
ts = "__almd_json.null()"

[array]
description = "Create a Json array from a list of Json values."
example = 'json.array([json.i(1), json.i(2)])'
params = [{ name = "items", type = "List[Value]" }]
return = "Value"
rust = "Value::Array({items})"
ts = "__almd_json.array({items})"

[from_float]
description = "Create a Json float value."
example = 'json.from_float(3.14)'
params = [{ name = "n", type = "Float" }]
return = "Value"
rust = "Value::Float({n})"
ts = "__almd_json.from_float({n})"

[stringify_pretty]
description = "Convert a Json value to a pretty-printed JSON string with indentation."
example = 'json.stringify_pretty(j)'
params = [{ name = "j", type = "Value" }]
return = "String"
rust = "almide_json_stringify_pretty(&{j})"
ts = "__almd_json.stringify_pretty({j})"

# ── Builder shortcuts ──────────────────────────────────────────────

[object]
description = "Create a Json object from a list of (key, value) pairs."
example = 'json.object([("name", json.s("Alice")), ("age", json.i(30))])'
params = [{ name = "entries", type = "List[(String, Value)]" }]
return = "Value"
rust = "Value::Object({entries})"
ts = "__almd_json.object({entries})"

