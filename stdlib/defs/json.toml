rust = "almide_json_get_float(&{j}, &{key})"
ts = "__almd_json.get_float({j}, {key})"

[get_bool]
description = "Get a boolean value by key. Returns none if key doesn't exist or value is not a boolean."
example = 'json.get_bool(j, "active")'
params = [{ name = "j", type = "Value" }, { name = "key", type = "String" }]
return = "Option[Bool]"
rust = "almide_json_get_bool(&{j}, &{key})"
ts = "__almd_json.get_bool({j}, {key})"

[get_array]
