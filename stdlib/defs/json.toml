# ── Path API ───────────────────────────────────────────────────────

[root]
description = "Create a root JSON path for traversal."
example = 'json.root()'
params = []
return = "JsonPath"
rust = "AlmideJsonPath::JpRoot"
ts = "__almd_json.path_root()"

[field]
description = "Extend a JSON path with a field name."
example = 'json.field(json.root(), "user")'
params = [{ name = "path", type = "JsonPath" }, { name = "name", type = "String" }]
return = "JsonPath"
rust = "AlmideJsonPath::JpField(Box::new({path}), {name})"
ts = "__almd_json.path_field({path}, {name})"

[index]
description = "Extend a JSON path with an array index."
example = 'json.index(json.field(json.root(), "items"), 0)'
params = [{ name = "path", type = "JsonPath" }, { name = "i", type = "Int" }]
return = "JsonPath"
rust = "AlmideJsonPath::JpIndex(Box::new({path}), {i})"
ts = "__almd_json.path_index({path}, {i})"

[get_path]
description = "Get a value at a JSON path. Returns none if path doesn't exist."
example = 'json.get_path(j, json.field(json.root(), "name"))'
params = [{ name = "j", type = "Value" }, { name = "path", type = "JsonPath" }]
return = "Option[Value]"
rust = "almide_json_get_path(&{j}, &{path})"
ts = "__almd_json.get_path({j}, {path})"

[set_path]
description = "Set a value at a JSON path. Returns error if path is invalid."
example = 'json.set_path(j, json.field(json.root(), "name"), json.s("Bob"))'
params = [{ name = "j", type = "Value" }, { name = "path", type = "JsonPath" }, { name = "value", type = "Value" }]
return = "Result[Value, String]"
rust = "almide_json_set_path(&{j}, &{path}, {value})?"
ts = "__almd_json.set_path({j}, {path}, {value})"

[remove_path]
description = "Remove a value at a JSON path. Returns the Json with the value removed."
example = 'json.remove_path(j, json.field(json.root(), "temp"))'
params = [{ name = "j", type = "Value" }, { name = "path", type = "JsonPath" }]
return = "Value"
rust = "almide_json_remove_path(&{j}, &{path})"
ts = "__almd_json.remove_path({j}, {path})"
