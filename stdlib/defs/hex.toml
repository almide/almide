# hex — Hexadecimal encoding for binary data.

[encode]
description = "Encode bytes as a lowercase hex string. 1 byte → 2 chars."
example = 'hex.encode(bytes.from_string("Hi")) // => "4869"'
params = [{ name = "b", type = "Bytes" }]
return = "String"
rust = "almide_rt_hex_encode(&{b})"

[encode_upper]
description = "Encode bytes as an uppercase hex string."
example = 'hex.encode_upper(bytes.from_string("Hi")) // => "4869"'
params = [{ name = "b", type = "Bytes" }]
return = "String"
rust = "almide_rt_hex_encode_upper(&{b})"

[decode]
description = "Decode a hex string into bytes. Accepts both upper and lower case; returns `err` on odd length or non-hex characters."
example = 'hex.decode("4869") // => ok(<bytes>)'
params = [{ name = "s", type = "String" }]
return = "Result[Bytes, String]"
effect = false
rust = "almide_rt_hex_decode(&{s})"
