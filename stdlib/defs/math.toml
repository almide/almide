[min]
params = [{ name = "a", type = "Int" }, { name = "b", type = "Int" }]
return = "Int"
rust = "almide_rt_math_min({a}, {b})"
ts = "__almd_math.min({a}, {b})"

[max]
params = [{ name = "a", type = "Int" }, { name = "b", type = "Int" }]
return = "Int"
rust = "almide_rt_math_max({a}, {b})"
ts = "__almd_math.max({a}, {b})"

[abs]
params = [{ name = "n", type = "Int" }]
return = "Int"
rust = "almide_rt_math_abs({n})"
ts = "__almd_math.abs({n})"

[pow]
params = [{ name = "base", type = "Int" }, { name = "exp", type = "Int" }]
return = "Int"
rust = "almide_rt_math_pow({base}, {exp})"
ts = "__almd_math.pow({base}, {exp})"

[pi]
params = []
return = "Float"
rust = "almide_rt_math_pi()"
