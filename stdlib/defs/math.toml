[min]
description = "Return the smaller of two integers."
example = "math.min(3, 7) // => 3"
params = [{ name = "a", type = "Int" }, { name = "b", type = "Int" }]
return = "Int"
rust = "std::cmp::min({a}, {b})"
ts = "__almd_math.min({a}, {b})"

[max]
description = "Return the larger of two integers."
example = "math.max(3, 7) // => 7"
params = [{ name = "a", type = "Int" }, { name = "b", type = "Int" }]
return = "Int"
rust = "std::cmp::max({a}, {b})"
ts = "__almd_math.max({a}, {b})"

[abs]
description = "Return the absolute value of an integer."
example = "math.abs(-5) // => 5"
params = [{ name = "n", type = "Int" }]
return = "Int"
rust = "({n}).abs()"
ts = "__almd_math.abs({n})"

[pow]
description = "Raise an integer base to an integer exponent."
example = "math.pow(2, 10) // => 1024"
params = [{ name = "base", type = "Int" }, { name = "exp", type = "Int" }]
return = "Int"
rust = "({base}).pow({exp} as u32)"
ts = "__almd_math.pow({base}, {exp})"

