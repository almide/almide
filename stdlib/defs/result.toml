[map]
description = "Transform the ok value using a function. If err, passes through unchanged."
example = 'result.map(ok(2), fn(x) => x * 10)'
type_params = ["A", "B", "E"]
params = [
    { name = "r", type = "Result[A, E]" },
    { name = "f", type = "Fn[A] -> B" },
]
return = "Result[B, E]"
rust = "({r}).map(|{f.args}| {{ {f.body} }})"
ts = "(({f.args}) => {f.body})({r})"

[map_err]
description = "Transform the err value using a function. If ok, passes through unchanged."
example = 'result.map_err(err("fail"), fn(e) => "wrapped: " ++ e)'
type_params = ["A", "E", "F"]
params = [
    { name = "r", type = "Result[A, E]" },
    { name = "f", type = "Fn[E] -> F" },
]
return = "Result[A, F]"
rust = "({r}).map_err(|{f.args}| {{ {f.body} }})"
ts = "{r}"

[flat_map]
description = "Chain a Result-returning function on the ok value. Flattens nested Results."
example = 'result.and_then(ok(5), fn(x) => if x > 0 then ok(x) else err("negative"))'
type_params = ["A", "B", "E"]
params = [
    { name = "r", type = "Result[A, E]" },
    { name = "f", type = "Fn[A] -> Result[B, E]" },
]
return = "Result[B, E]"
rust = "({r}).and_then(|{f.args}| {{ {f.body} }})"
ts = "(({f.args}) => {f.body})({r})"

[unwrap_or]
description = "Get the ok value, or return a default if err."
example = 'result.unwrap_or(err("fail"), 0)'
type_params = ["A", "E"]
params = [{ name = "r", type = "Result[A, E]" }, { name = "default", type = "A" }]
return = "A"
rust = "({r}).unwrap_or({default})"
ts = "__almd_result_unwrap_or({r}, {default})"

[unwrap_or_else]
description = "Get the ok value, or compute a default from the error using a function."
example = 'result.unwrap_or_else(err("fail"), fn(e) => string.len(e))'
type_params = ["A", "E"]
params = [
    { name = "r", type = "Result[A, E]" },
    { name = "f", type = "Fn[E] -> A" },
]
return = "A"
rust = "({r}).unwrap_or_else(|{f.args}| {{ {f.body} }})"
ts = "__almd_result_unwrap_or_else({r}, ({f.args}) => {f.body})"

[is_ok]
description = "Check if the Result is ok."
example = 'result.is_ok(ok(42))'
type_params = ["A", "E"]
params = [{ name = "r", type = "Result[A, E]" }]
return = "Bool"
rust = "({r}).is_ok()"
ts = "__almd_result_is_ok({r})"

[is_err]
description = "Check if the Result is err."
example = 'result.is_err(err("fail"))'
type_params = ["A", "E"]
params = [{ name = "r", type = "Result[A, E]" }]
return = "Bool"
rust = "({r}).is_err()"
ts = "__almd_result_is_err({r})"

[to_option]
description = "Convert ok to some, err to none. Discards the error value."
example = 'result.to_option(ok(42))'
type_params = ["A", "E"]
params = [{ name = "r", type = "Result[A, E]" }]
return = "Option[A]"
rust = "({r}).ok()"
ts = "__almd_result_to_option({r})"

[to_err_option]
description = "Convert err to some, ok to none. Discards the ok value."
example = 'result.to_err_option(err("fail"))'
type_params = ["A", "E"]
params = [{ name = "r", type = "Result[A, E]" }]
return = "Option[E]"
rust = "({r}).err()"
ts = "__almd_result_to_err_option({r})"

[collect]
description = "Collect a list of Results. All ok → ok(values), any err → err(all_errors)."
example = 'result.collect([ok(1), ok(2), ok(3)]) // => ok([1, 2, 3])'
type_params = ["T", "E"]
params = [{ name = "rs", type = "List[Result[T, E]]" }]
return = "Result[List[T], List[E]]"
rust = "almide_rt_result_collect(({rs}).to_vec())"
ts = "__almd_result_collect({rs})"

[partition]
description = "Partition a list of Results into ok values and err values."
example = 'result.partition([ok(1), err("x"), ok(2)]) // => ([1, 2], ["x"])'
type_params = ["T", "E"]
params = [{ name = "rs", type = "List[Result[T, E]]" }]
return = "(List[T], List[E])"
rust = "almide_rt_result_partition(({rs}).to_vec())"
ts = "__almd_result_partition({rs})"

[collect_map]
description = "Map a function over a list and collect Results. All ok → ok(values), any err → err(all_errors)."
example = 'result.collect_map([1, 2, 3], fn(x) => if x > 0 then ok(x) else err("neg"))'
type_params = ["T", "U", "E"]
params = [
    { name = "xs", type = "List[T]" },
    { name = "f", type = "Fn[T] -> Result[U, E]" },
]
return = "Result[List[U], List[E]]"
rust = "almide_rt_result_collect_map(({xs}).to_vec(), |{f.args}| {{ {f.clone_bindings}{f.body} }})"
ts = "__almd_result_collect_map({xs}, {f.args} => {f.body})"
