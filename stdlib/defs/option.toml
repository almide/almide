[map]
description = "Transform the inner value using a function. If none, returns none."
example = "option.map(some(2), (x) => x * 10) // => some(20)"
type_params = ["A", "B"]
params = [
    { name = "o", type = "Option[A]" },
    { name = "f", type = "Fn[A] -> B" },
]
return = "Option[B]"
rust = "almide_rt_option_map({o}, |{f.args}| {{ {f.body} }})"
ts = "__almd_option.map({o}, ({f.args}) => {f.body})"

[flat_map]
description = "Chain an Option-returning function on the inner value. Flattens nested Options."
example = "option.flat_map(some(5), (x) => if x > 0 then some(x) else none)"
type_params = ["A", "B"]
params = [
    { name = "o", type = "Option[A]" },
    { name = "f", type = "Fn[A] -> Option[B]" },
]
return = "Option[B]"
rust = "almide_rt_option_and_then({o}, |{f.args}| {{ {f.body} }})"
ts = "__almd_option.flat_map({o}, ({f.args}) => {f.body})"

[flatten]
description = "Flatten a nested Option. some(some(x)) becomes some(x), some(none) becomes none."
example = "option.flatten(some(some(42))) // => some(42)"
type_params = ["A"]
params = [{ name = "o", type = "Option[Option[A]]" }]
return = "Option[A]"
rust = "almide_rt_option_flatten({o})"
ts = "__almd_option.flatten({o})"

[unwrap_or]
description = "Get the inner value, or return a default if none."
example = "option.unwrap_or(none, 0) // => 0"
type_params = ["A"]
params = [{ name = "o", type = "Option[A]" }, { name = "default", type = "A" }]
return = "A"
rust = "almide_rt_option_unwrap_or({o}, {default})"
ts = "__almd_option.unwrap_or({o}, {default})"

[unwrap_or_else]
description = "Get the inner value, or compute a default using a function."
example = "option.unwrap_or_else(none, () => 42) // => 42"
type_params = ["A"]
params = [
    { name = "o", type = "Option[A]" },
    { name = "f", type = "Fn[Unit] -> A" },
]
return = "A"
rust = "almide_rt_option_unwrap_or_else({o}, || {{ {f.body} }})"
ts = "__almd_option.unwrap_or_else({o}, () => {f.body})"

[is_some]
description = "Check if the Option contains a value."
example = "option.is_some(some(42)) // => true"
type_params = ["A"]
params = [{ name = "o", type = "Option[A]" }]
return = "Bool"
rust = "almide_rt_option_is_some(&{o})"
ts = "__almd_option.is_some({o})"

[is_none]
description = "Check if the Option is none."
example = "option.is_none(none) // => true"
type_params = ["A"]
params = [{ name = "o", type = "Option[A]" }]
return = "Bool"
rust = "almide_rt_option_is_none(&{o})"
ts = "__almd_option.is_none({o})"

[to_result]
description = "Convert some to ok, none to err with the given error message."
example = 'option.to_result(some(42), "missing") // => ok(42)'
type_params = ["A"]
params = [{ name = "o", type = "Option[A]" }, { name = "err", type = "String" }]
return = "Result[A, String]"
rust = "almide_rt_option_to_result({o}, {err})"
ts = "__almd_option.to_result({o}, {err})"

[filter]
description = "Keep the value if it satisfies the predicate, otherwise return none."
example = "option.filter(some(5), (x) => x > 3) // => some(5)"
type_params = ["A"]
params = [
    { name = "o", type = "Option[A]" },
    { name = "f", type = "Fn[A] -> Bool" },
]
return = "Option[A]"
rust = "almide_rt_option_filter({o}, |{f.args}| {{ {f.body} }})"
ts = "__almd_option.filter({o}, ({f.args}) => {f.body})"

[zip]
description = "Combine two Options into an Option of a tuple. None if either is none."
example = "option.zip(some(1), some(2)) // => some((1, 2))"
type_params = ["A", "B"]
params = [{ name = "a", type = "Option[A]" }, { name = "b", type = "Option[B]" }]
return = "Option[(A, B)]"
rust = "almide_rt_option_zip({a}, {b})"
ts = "__almd_option.zip({a}, {b})"

[or_else]
description = "Return the Option if some, otherwise call the function to produce an alternative."
example = "option.or_else(none, () => some(42)) // => some(42)"
type_params = ["A"]
params = [
    { name = "o", type = "Option[A]" },
    { name = "f", type = "Fn[Unit] -> Option[A]" },
]
return = "Option[A]"
rust = "almide_rt_option_or_else({o}, || {{ {f.body} }})"
ts = "__almd_option.or_else({o}, () => {f.body})"
