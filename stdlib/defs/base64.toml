# base64 — RFC 4648 Base64 encoding for binary data.
#
# Standard alphabet (`A-Za-z0-9+/`) with `=` padding. The decoder accepts both
# padded and unpadded inputs and rejects invalid characters with `Result::err`.

[encode]
description = "Encode bytes as a standard Base64 string with `=` padding (RFC 4648)."
example = 'base64.encode(bytes.from_string("hi")) // => "aGk="'
params = [{ name = "b", type = "Bytes" }]
return = "String"
rust = "almide_rt_base64_encode(&{b})"

[decode]
description = "Decode a Base64 string. Accepts padded and unpadded input; returns `err` on invalid characters."
example = 'base64.decode("aGk=") // => ok(<bytes>)'
params = [{ name = "s", type = "String" }]
return = "Result[Bytes, String]"
effect = false
rust = "almide_rt_base64_decode(&{s})"

[encode_url]
description = "Encode bytes as URL-safe Base64 (`-` and `_` instead of `+` and `/`), no padding."
example = 'base64.encode_url(bytes.from_string("hi")) // => "aGk"'
params = [{ name = "b", type = "Bytes" }]
return = "String"
rust = "almide_rt_base64_encode_url(&{b})"

[decode_url]
description = "Decode URL-safe Base64. Accepts both `-_` and `+/` alphabets, padding optional."
example = 'base64.decode_url("aGk") // => ok(<bytes>)'
params = [{ name = "s", type = "String" }]
return = "Result[Bytes, String]"
effect = false
rust = "almide_rt_base64_decode_url(&{s})"
