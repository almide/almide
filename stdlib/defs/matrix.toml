[zeros]
description = "Create a zero-filled matrix."
example = 'matrix.zeros(3, 4)'
params = [{ name = "rows", type = "Int" }, { name = "cols", type = "Int" }]
return = "Matrix"
rust = "almide_rt_matrix_zeros({rows}, {cols})"
ts = "__almd_matrix.zeros({rows}, {cols})"

[ones]
description = "Create a matrix filled with ones."
example = 'matrix.ones(3, 4)'
params = [{ name = "rows", type = "Int" }, { name = "cols", type = "Int" }]
return = "Matrix"
rust = "almide_rt_matrix_ones({rows}, {cols})"
ts = "__almd_matrix.ones({rows}, {cols})"

[shape]
description = "Get the (rows, cols) shape of a matrix."
example = 'matrix.shape(m) // => (3, 4)'
params = [{ name = "m", type = "Matrix" }]
return = "(Int, Int)"
rust = "almide_rt_matrix_shape(&{m})"
ts = "__almd_matrix.shape({m})"

[transpose]
description = "Transpose a matrix."
example = 'matrix.transpose(m)'
params = [{ name = "m", type = "Matrix" }]
return = "Matrix"
rust = "almide_rt_matrix_transpose(&{m})"
ts = "__almd_matrix.transpose({m})"

[from_lists]
description = "Create a matrix from a list of row lists."
example = 'matrix.from_lists([[1.0, 2.0], [3.0, 4.0]])'
params = [{ name = "rows", type = "List[List[Float]]" }]
return = "Matrix"
rust = "almide_rt_matrix_from_lists(&{rows})"
ts = "__almd_matrix.from_lists({rows})"

[to_lists]
description = "Convert a matrix to a list of row lists."
example = 'matrix.to_lists(m) // => [[1.0, 2.0], [3.0, 4.0]]'
params = [{ name = "m", type = "Matrix" }]
return = "List[List[Float]]"
rust = "almide_rt_matrix_to_lists(&{m})"
ts = "__almd_matrix.to_lists({m})"

[get]
description = "Get element at (row, col)."
example = 'matrix.get(m, 0, 1) // => 2.0'
params = [{ name = "m", type = "Matrix" }, { name = "row", type = "Int" }, { name = "col", type = "Int" }]
return = "Float"
rust = "almide_rt_matrix_get(&{m}, {row}, {col})"
ts = "__almd_matrix.get({m}, {row}, {col})"

[rows]
description = "Get the number of rows."
example = 'matrix.rows(m) // => 3'
params = [{ name = "m", type = "Matrix" }]
return = "Int"
rust = "almide_rt_matrix_rows(&{m})"
ts = "__almd_matrix.rows({m})"

[cols]
description = "Get the number of columns."
example = 'matrix.cols(m) // => 4'
params = [{ name = "m", type = "Matrix" }]
return = "Int"
rust = "almide_rt_matrix_cols(&{m})"
ts = "__almd_matrix.cols({m})"

[add]
description = "Element-wise addition of two matrices."
example = 'matrix.add(a, b)'
params = [{ name = "a", type = "Matrix" }, { name = "b", type = "Matrix" }]
return = "Matrix"
rust = "almide_rt_matrix_add(&{a}, &{b})"
ts = "__almd_matrix.add({a}, {b})"

[mul]
description = "Matrix multiplication."
example = 'matrix.mul(a, b)'
params = [{ name = "a", type = "Matrix" }, { name = "b", type = "Matrix" }]
return = "Matrix"
rust = "almide_rt_matrix_mul(&{a}, &{b})"
ts = "__almd_matrix.mul({a}, {b})"

[scale]
description = "Multiply all elements by a scalar."
example = 'matrix.scale(m, 2.0)'
params = [{ name = "m", type = "Matrix" }, { name = "s", type = "Float" }]
return = "Matrix"
rust = "almide_rt_matrix_scale(&{m}, {s})"
ts = "__almd_matrix.scale({m}, {s})"

[fma]
description = "Fused multiply-add: `a*ka + b*kb` in a single pass with one allocation. Equivalent to `matrix.add(matrix.scale(a, ka), matrix.scale(b, kb))` but avoids two intermediate matrices and reads each input only once. Significantly faster for elementwise chains."
example = 'matrix.fma(a, 1.5, b, -0.5)'
params = [{ name = "a", type = "Matrix" }, { name = "ka", type = "Float" }, { name = "b", type = "Matrix" }, { name = "kb", type = "Float" }]
return = "Matrix"
rust = "almide_rt_matrix_fma(&{a}, {ka}, &{b}, {kb})"
ts = "__almd_matrix.fma({a}, {ka}, {b}, {kb})"

[fma3]
description = "Three-term fused multiply-add: `a*ka + b*kb + c*kc` in a single pass with one allocation. Used by fusion pass to collapse nested `fma(fma(...))` expressions into one sweep."
example = 'matrix.fma3(a, 2.0, b, -1.0, c, 0.5)'
params = [{ name = "a", type = "Matrix" }, { name = "ka", type = "Float" }, { name = "b", type = "Matrix" }, { name = "kb", type = "Float" }, { name = "c", type = "Matrix" }, { name = "kc", type = "Float" }]
return = "Matrix"
rust = "almide_rt_matrix_fma3(&{a}, {ka}, &{b}, {kb}, &{c}, {kc})"
ts = "__almd_matrix.fma3({a}, {ka}, {b}, {kb}, {c}, {kc})"

[sub]
description = "Element-wise subtraction `a - b`. Both matrices must have the same shape."
example = 'matrix.sub(a, b)'
params = [{ name = "a", type = "Matrix" }, { name = "b", type = "Matrix" }]
return = "Matrix"
rust = "almide_rt_matrix_sub(&{a}, &{b})"

[div]
description = "Element-wise division `a / b`. Both matrices must have the same shape. Division by zero yields ±Inf or NaN per IEEE-754."
example = 'matrix.div(a, b)'
params = [{ name = "a", type = "Matrix" }, { name = "b", type = "Matrix" }]
return = "Matrix"
rust = "almide_rt_matrix_div(&{a}, &{b})"

[neg]
description = "Element-wise negation."
example = 'matrix.neg(m)'
params = [{ name = "m", type = "Matrix" }]
return = "Matrix"
rust = "almide_rt_matrix_neg(&{m})"

[pow]
description = "Element-wise power: each element raised to scalar exponent `exp`."
example = 'matrix.pow(m, 2.0)'
params = [{ name = "m", type = "Matrix" }, { name = "exp", type = "Float" }]
return = "Matrix"
rust = "almide_rt_matrix_pow(&{m}, {exp})"

[map]
description = "Apply a function to every element."
example = 'matrix.map(m, (x) => x * x)'
params = [{ name = "m", type = "Matrix" }, { name = "f", type = "fn(Float) -> Float" }]
return = "Matrix"
rust = "almide_rt_matrix_map(&{m}, {f})"
ts = "__almd_matrix.map({m}, {f})"

[from_bytes_f32_le]
description = "Zero-copy(-ish) construction: read rows*cols f32 little-endian values from `data` at `offset` and build a Matrix. Dramatically faster than iterating and calling from_lists when loading ML weights from disk."
example = 'matrix.from_bytes_f32_le(weight_bytes, 0, 384, 384)'
params = [
  { name = "data", type = "Bytes" },
  { name = "offset", type = "Int" },
  { name = "rows", type = "Int" },
  { name = "cols", type = "Int" },
]
return = "Matrix"
rust = "almide_rt_matrix_from_bytes_f32_le(&{data}, {offset}, {rows}, {cols})"

[to_bytes_f64_le]
description = "Serialize a Matrix to flat f64 little-endian bytes (row-major). Symmetric to `from_bytes_f64_le`. Useful for shipping a Matrix to JS/WASM hosts."
example = 'let bytes = matrix.to_bytes_f64_le(mel)'
params = [{ name = "m", type = "Matrix" }]
return = "Bytes"
rust = "almide_rt_matrix_to_bytes_f64_le(&{m})"

[to_bytes_f32_le]
description = "Serialize a Matrix to flat f32 little-endian bytes (row-major). Each f64 value is demoted to f32."
example = 'let bytes = matrix.to_bytes_f32_le(weight)'
params = [{ name = "m", type = "Matrix" }]
return = "Bytes"
rust = "almide_rt_matrix_to_bytes_f32_le(&{m})"

[from_bytes_f16_le]
description = "Zero-copy(-ish) construction: read rows*cols IEEE-754 half-precision values (f16 little-endian) from `data` at `offset` and build a Matrix of f64. Used for GGML F16 quantised weights."
example = 'matrix.from_bytes_f16_le(weight_bytes, 0, 384, 384)'
params = [
  { name = "data", type = "Bytes" },
  { name = "offset", type = "Int" },
  { name = "rows", type = "Int" },
  { name = "cols", type = "Int" },
]
return = "Matrix"
rust = "almide_rt_matrix_from_bytes_f16_le(&{data}, {offset}, {rows}, {cols})"

# ── Neural-network primitives (row-wise operations) ──
# These avoid Almide-level Matrix↔List[List] round-trips that dominate
# transformer forward passes. Inner loops run in native code.

[broadcast_add_row]
description = "Add a 1-D bias vector to every row of `m`. Shape: m stays (r, c), bias must have length c."
params = [{ name = "m", type = "Matrix" }, { name = "bias", type = "List[Float]" }]
return = "Matrix"
rust = "almide_rt_matrix_broadcast_add_row(&{m}, &{bias})"

[layer_norm_rows]
description = "Row-wise Layer Normalization: out[i,j] = (m[i,j] - mean_i) / sqrt(var_i + eps) * gamma[j] + beta[j]."
params = [
  { name = "m", type = "Matrix" },
  { name = "gamma", type = "List[Float]" },
  { name = "beta", type = "List[Float]" },
  { name = "eps", type = "Float" },
]
return = "Matrix"
rust = "almide_rt_matrix_layer_norm_rows(&{m}, &{gamma}, &{beta}, {eps})"

[softmax_rows]
description = "Numerically-stable row-wise softmax."
params = [{ name = "m", type = "Matrix" }]
return = "Matrix"
rust = "almide_rt_matrix_softmax_rows(&{m})"

[gelu]
description = "Element-wise GELU (tanh approximation used by GPT-2/Whisper)."
params = [{ name = "m", type = "Matrix" }]
return = "Matrix"
rust = "almide_rt_matrix_gelu(&{m})"

[split_cols_even]
description = "Split `m` column-wise into `n` equal chunks. Each result matrix has cols/n columns."
params = [{ name = "m", type = "Matrix" }, { name = "n", type = "Int" }]
return = "List[Matrix]"
rust = "almide_rt_matrix_split_cols_even(&{m}, {n})"

[concat_cols]
description = "Concatenate a List of matrices column-wise. All matrices must share the same number of rows."
example = 'matrix.concat_cols([heads_0, heads_1, heads_2])'
params = [{ name = "matrices", type = "List[Matrix]" }]
return = "Matrix"
rust = "almide_rt_matrix_concat_cols_many(&{matrices})"

# Deprecated alias of concat_cols. The "_many" suffix was redundant given the
# List[Matrix] argument; new code should use concat_cols.
[concat_cols_many]
description = "Deprecated: use matrix.concat_cols instead."
params = [{ name = "matrices", type = "List[Matrix]" }]
return = "Matrix"
rust = "almide_rt_matrix_concat_cols_many(&{matrices})"

[causal_mask_add]
description = "Add `mask_val` at positions where col > row (upper triangular). Used for decoder self-attention masks."
params = [{ name = "m", type = "Matrix" }, { name = "mask_val", type = "Float" }]
return = "Matrix"
rust = "almide_rt_matrix_causal_mask_add(&{m}, {mask_val})"

[multi_head_attention]
description = "Batched multi-head scaled dot-product attention. Reshapes (S, D) → (H, S, D/H), does batched Q@K^T/sqrt(D/H), row-wise softmax, @V, reshapes back to (S, D). All heads computed in one 3-D matmul (BLAS-friendly, unlike head-by-head iteration)."
params = [
  { name = "q", type = "Matrix" },
  { name = "k", type = "Matrix" },
  { name = "v", type = "Matrix" },
  { name = "n_heads", type = "Int" },
]
return = "Matrix"
rust = "almide_rt_matrix_multi_head_attention(&{q}, &{k}, &{v}, {n_heads})"

[masked_multi_head_attention]
description = "Multi-head attention with a causal (upper-triangular) mask applied before softmax. Used for decoder self-attention."
params = [
  { name = "q", type = "Matrix" },
  { name = "k", type = "Matrix" },
  { name = "v", type = "Matrix" },
  { name = "n_heads", type = "Int" },
]
return = "Matrix"
rust = "almide_rt_matrix_masked_multi_head_attention(&{q}, &{k}, &{v}, {n_heads})"

[linear_row]
description = "Compute `x @ weight^T + bias` (row-major linear layer). Combines transpose + matmul + broadcast_add into one native call; eliminates two intermediate tensors."
params = [{ name = "x", type = "Matrix" }, { name = "weight", type = "Matrix" }, { name = "bias", type = "List[Float]" }]
return = "Matrix"
rust = "almide_rt_matrix_linear_row(&{x}, &{weight}, &{bias})"

[linear_row_no_bias]
description = "Same as linear_row without bias: `x @ weight^T`."
params = [{ name = "x", type = "Matrix" }, { name = "weight", type = "Matrix" }]
return = "Matrix"
rust = "almide_rt_matrix_linear_row_no_bias(&{x}, &{weight})"

[slice_rows]
description = "Extract rows [start, end) as a new Matrix."
params = [{ name = "m", type = "Matrix" }, { name = "start", type = "Int" }, { name = "end", type = "Int" }]
return = "Matrix"
rust = "almide_rt_matrix_slice_rows(&{m}, {start}, {end})"

[conv1d]
description = "1D convolution along the time axis. input: (T, in_ch). weight: (out_ch, in_ch*kernel) flattened (row-major). bias: (out_ch,). Returns (T_out, out_ch) where T_out = floor((T + 2*padding - kernel) / stride) + 1. Used by Whisper's audio frontend (conv1: k=3, s=1, p=1; conv2: k=3, s=2, p=1)."
params = [
  { name = "input", type = "Matrix" },
  { name = "weight", type = "Matrix" },
  { name = "bias", type = "List[Float]" },
  { name = "kernel", type = "Int" },
  { name = "stride", type = "Int" },
  { name = "padding", type = "Int" },
]
return = "Matrix"
rust = "almide_rt_matrix_conv1d(&{input}, &{weight}, &{bias}, {kernel}, {stride}, {padding})"

[from_bytes_f64_le]
description = "Construct Matrix from raw f64 LE bytes. Used when external code (JS host) computes a mel spectrogram and passes it as bytes."
params = [
  { name = "data", type = "Bytes" },
  { name = "offset", type = "Int" },
  { name = "rows", type = "Int" },
  { name = "cols", type = "Int" },
]
return = "Matrix"
rust = "almide_rt_matrix_from_bytes_f64_le(&{data}, {offset}, {rows}, {cols})"

[gather_rows]
description = "Build a new matrix from selected row indices: result[i] = m[indices[i]]. Far faster than `to_lists |> map |> from_lists` for large matrices like token embedding tables."
params = [{ name = "m", type = "Matrix" }, { name = "indices", type = "List[Int]" }]
return = "Matrix"
rust = "almide_rt_matrix_gather_rows(&{m}, &{indices})"

[dot_row]
description = "Compute dot product of `m`'s row `r` with the given `vec`. Avoids materialising the row as a List."
example = 'matrix.dot_row(weights, 0, hidden)'
params = [{ name = "m", type = "Matrix" }, { name = "r", type = "Int" }, { name = "vec", type = "List[Float]" }]
return = "Float"
rust = "almide_rt_matrix_row_dot(&{m}, {r}, &{vec})"

# Deprecated alias of dot_row. Kept for backward compatibility; new code should
# use dot_row to follow the row-major naming convention (see CHEATSHEET).
[row_dot]
description = "Deprecated: use matrix.dot_row instead."
params = [{ name = "m", type = "Matrix" }, { name = "r", type = "Int" }, { name = "vec", type = "List[Float]" }]
return = "Float"
rust = "almide_rt_matrix_row_dot(&{m}, {r}, &{vec})"

# ── f32 path (preview) ────────────────────────────────────────────────────
# Same Matrix type, internal storage is f32. Use for matmul that can tolerate
# f32 precision to hit NumPy-f32-class throughput (1000+ GFLOPS). Values read
# via matrix.get upcast to Float (f64).

[zeros_f32]
description = "Create a zero-filled f32 matrix (preview)."
example = 'matrix.zeros_f32(1024, 1024)'
params = [{ name = "rows", type = "Int" }, { name = "cols", type = "Int" }]
return = "Matrix"
rust = "almide_rt_matrix_zeros_f32({rows}, {cols})"

[ones_f32]
description = "Create an f32 matrix filled with ones (preview)."
example = 'matrix.ones_f32(1024, 1024)'
params = [{ name = "rows", type = "Int" }, { name = "cols", type = "Int" }]
return = "Matrix"
rust = "almide_rt_matrix_ones_f32({rows}, {cols})"

[mul_f32]
description = "f32-backed matrix multiplication via cblas_sgemm (preview)."
example = 'matrix.mul_f32(a, b)'
params = [{ name = "a", type = "Matrix" }, { name = "b", type = "Matrix" }]
return = "Matrix"
rust = "almide_rt_matrix_mul_f32(&{a}, &{b})"

[mul_f32_scaled]
description = "Fused alpha*A*B for f32 — single cblas_sgemm call, no intermediate alloc (preview)."
example = 'matrix.mul_f32_scaled(a, 1.001, b)'
params = [{ name = "a", type = "Matrix" }, { name = "alpha", type = "Float" }, { name = "b", type = "Matrix" }]
return = "Matrix"
rust = "almide_rt_matrix_mul_f32_scaled(&{a}, {alpha}, &{b})"

[mul_f32_t]
description = "f32 A @ B^T (implicit transpose via cblas transB) — no intermediate copy."
example = 'matrix.mul_f32_t(q, k)  // q @ k^T for attention scores'
params = [{ name = "a", type = "Matrix" }, { name = "b", type = "Matrix" }]
return = "Matrix"
rust = "almide_rt_matrix_mul_f32_t(&{a}, &{b})"

[mul_f32_t_scaled]
description = "f32 alpha*A*B^T (fused scale + implicit transpose)."
example = 'matrix.mul_f32_t_scaled(q, inv_sqrt_d, k)  // scaled attention scores'
params = [{ name = "a", type = "Matrix" }, { name = "alpha", type = "Float" }, { name = "b", type = "Matrix" }]
return = "Matrix"
rust = "almide_rt_matrix_mul_f32_t_scaled(&{a}, {alpha}, &{b})"

[mul_scaled]
description = "Fused alpha*A*B for f64 — single cblas_dgemm call, no intermediate alloc."
example = 'matrix.mul_scaled(a, 2.0, b)'
params = [{ name = "a", type = "Matrix" }, { name = "alpha", type = "Float" }, { name = "b", type = "Matrix" }]
return = "Matrix"
rust = "almide_rt_matrix_mul_scaled(&{a}, {alpha}, &{b})"
