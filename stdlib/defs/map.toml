[new]
description = "Create an empty map."
example = 'let m = map.new()'
type_params = ["K", "V"]
params = []
return = "Map[K, V]"
rust = "almide_rt_map_new()"
ts = "__almd_map.new()"

[get]
description = "Get a value by key. Returns none if the key doesn't exist."
example = 'map.get(m, "name")'
type_params = ["K", "V"]
params = [{ name = "m", type = "Map[K, V]" }, { name = "key", type = "K" }]
return = "Option[V]"
rust = "almide_rt_map_get(&{m}, &{key})"
ts = "__almd_map.get({m}, {key})"

[get_or]
description = "Get a value by key, returning a default if the key doesn't exist."
example = 'map.get_or(m, "name", "unknown")'
type_params = ["K", "V"]
params = [{ name = "m", type = "Map[K, V]" }, { name = "key", type = "K" }, { name = "default", type = "V" }]
return = "V"
rust = "almide_rt_map_get_or(&{m}, &{key}, {default})"
ts = "__almd_map.get_or({m}, {key}, {default})"

[set]
description = "Return a new map with the key set to value. Immutable — does not modify the original."
example = 'let m2 = map.set(m, "name", "Alice")'
type_params = ["K", "V"]
params = [{ name = "m", type = "Map[K, V]" }, { name = "key", type = "K" }, { name = "value", type = "V" }]
return = "Map[K, V]"
rust = "almide_rt_map_set(&{m}, {key}, {value})"
ts = "__almd_map.set({m}, {key}, {value})"

[contains]
description = "Check if a key exists in the map."
example = 'map.contains(m, "name")'
type_params = ["K", "V"]
params = [{ name = "m", type = "Map[K, V]" }, { name = "key", type = "K" }]
return = "Bool"
rust = "almide_rt_map_contains(&{m}, &{key})"
ts = "__almd_map.contains({m}, {key})"

[remove]
description = "Return a new map with the key removed. Immutable — does not modify the original."
example = 'let m2 = map.remove(m, "temp")'
type_params = ["K", "V"]
params = [{ name = "m", type = "Map[K, V]" }, { name = "key", type = "K" }]
return = "Map[K, V]"
rust = "almide_rt_map_remove(&{m}, &{key})"
ts = "__almd_map.remove({m}, {key})"

[keys]
description = "Get all keys as a sorted list."
example = 'map.keys(m)'
type_params = ["K", "V"]
params = [{ name = "m", type = "Map[K, V]" }]
return = "List[K]"
rust = "almide_rt_map_keys(&{m})"
ts = "__almd_map.keys({m})"

[values]
description = "Get all values as a list."
example = 'map.values(m)'
type_params = ["K", "V"]
params = [{ name = "m", type = "Map[K, V]" }]
return = "List[V]"
rust = "almide_rt_map_values(&{m})"
ts = "__almd_map.values({m})"

[len]
description = "Get the number of key-value pairs in the map."
example = 'map.len(m)'
type_params = ["K", "V"]
params = [{ name = "m", type = "Map[K, V]" }]
return = "Int"
rust = "almide_rt_map_len(&{m})"
ts = "__almd_map.len({m})"

[entries]
description = "Get all key-value pairs as a list of tuples, sorted by key."
example = 'map.entries(m)'
type_params = ["K", "V"]
params = [{ name = "m", type = "Map[K, V]" }]
return = "List[(K, V)]"
rust = "almide_rt_map_entries(&{m})"
ts = "__almd_map.entries({m})"

[merge]
description = "Merge two maps. Keys in the second map override keys in the first."
example = 'map.merge(base, overrides)'
type_params = ["K", "V"]
params = [{ name = "a", type = "Map[K, V]" }, { name = "b", type = "Map[K, V]" }]
return = "Map[K, V]"
rust = "almide_rt_map_merge(&{a}, &{b})"
ts = "__almd_map.merge({a}, {b})"

[is_empty]
description = "Check if the map has no entries."
example = 'map.is_empty(m)'
type_params = ["K", "V"]
params = [{ name = "m", type = "Map[K, V]" }]
return = "Bool"
rust = "almide_rt_map_is_empty(&{m})"
ts = "__almd_map.is_empty({m})"

# ── Construction ──

[from_list]
description = "Create a map from a list of (key, value) pairs."
example = 'map.from_list([("a", 1), ("b", 2)])'
type_params = ["K", "V"]
params = [{ name = "pairs", type = "List[(K, V)]" }]
return = "Map[K, V]"
rust = "almide_rt_map_from_entries({pairs})"
ts = "__almd_map.from_entries({pairs})"

[map]
description = "Transform all values in the map using a function, keeping keys unchanged."
example = 'map.map_values(m, fn(v) => v * 2)'
type_params = ["K", "V", "B"]
params = [
    { name = "m", type = "Map[K, V]" },
    { name = "f", type = "Fn[V] -> B" },
]
return = "Map[K, B]"
rust = "almide_rt_map_map_values(&{m}, |{f.args}| {{ {f.clone_bindings}{f.body} }})"
ts = "__almd_map.map_values({m}, {f.args} => {f.body})"

[filter]
description = "Return a new map containing only entries where the predicate returns true."
example = 'map.filter(m, fn(k, v) => v > 0)'
type_params = ["K", "V"]
params = [
    { name = "m", type = "Map[K, V]" },
    { name = "f", type = "Fn[K, V] -> Bool", clone_args = true },
]
return = "Map[K, V]"
rust = "almide_rt_map_filter(&{m}, |{f.args}| {{ {f.clone_bindings}{f.body} }})"
ts = "__almd_map.filter({m}, ({f.args}) => {f.body})"

[fold]
description = "Accumulate over all entries with an initial value."
example = 'map.fold(scores, 0, (acc, k, v) => acc + v)'
type_params = ["K", "V", "A"]
params = [
    { name = "m", type = "Map[K, V]" },
    { name = "init", type = "A" },
    { name = "f", type = "Fn[A, K, V] -> A" },
]
return = "A"
rust = "almide_rt_map_fold(&{m}, {init}, |{f.args}| {{ {f.clone_bindings}{f.body} }})"
ts = "__almd_map.fold({m}, {init}, ({f.args}) => {f.body})"

[any]
description = "Check if any entry satisfies the predicate."
example = 'map.any(scores, (k, v) => v >= 90)'
type_params = ["K", "V"]
params = [
    { name = "m", type = "Map[K, V]" },
    { name = "f", type = "Fn[K, V] -> Bool" },
]
return = "Bool"
rust = "almide_rt_map_any(&{m}, |{f.args}| {{ {f.clone_bindings}{f.body} }})"
ts = "__almd_map.any({m}, ({f.args}) => {f.body})"

[all]
description = "Check if all entries satisfy the predicate."
example = 'map.all(scores, (k, v) => v > 0)'
type_params = ["K", "V"]
params = [
    { name = "m", type = "Map[K, V]" },
    { name = "f", type = "Fn[K, V] -> Bool" },
]
return = "Bool"
rust = "almide_rt_map_all(&{m}, |{f.args}| {{ {f.clone_bindings}{f.body} }})"
ts = "__almd_map.all({m}, ({f.args}) => {f.body})"

[count]
description = "Count entries that satisfy the predicate."
example = 'map.count(scores, (k, v) => v >= 80)'
type_params = ["K", "V"]
params = [
    { name = "m", type = "Map[K, V]" },
    { name = "f", type = "Fn[K, V] -> Bool" },
]
return = "Int"
rust = "almide_rt_map_count(&{m}, |{f.args}| {{ {f.clone_bindings}{f.body} }})"
ts = "__almd_map.count({m}, ({f.args}) => {f.body})"

[each]
description = "Execute a side effect for each entry."
example = 'map.each(scores, (k, v) => println(k ++ ": " ++ int.to_string(v)))'
type_params = ["K", "V"]
params = [
    { name = "m", type = "Map[K, V]" },
    { name = "f", type = "Fn[K, V] -> Unit" },
]
return = "Unit"
rust = "almide_rt_map_each(&{m}, |{f.args}| {{ {f.clone_bindings}{f.body} }})"
ts = "__almd_map.each({m}, ({f.args}) => {f.body})"

[find]
description = "Find the first entry matching the predicate. Returns Option[(K, V)]."
example = 'map.find(scores, (k, v) => v >= 90)'
type_params = ["K", "V"]
params = [
    { name = "m", type = "Map[K, V]" },
    { name = "f", type = "Fn[K, V] -> Bool" },
]
return = "Option[(K, V)]"
rust = "almide_rt_map_find(&{m}, |{f.args}| {{ {f.clone_bindings}{f.body} }})"
ts = "__almd_map.find({m}, ({f.args}) => {f.body})"

[update]
description = "Update the value at a key using a function. Key must exist."
example = 'map.update(scores, "alice", (v) => v + 10)'
type_params = ["K", "V"]
params = [
    { name = "m", type = "Map[K, V]" },
    { name = "key", type = "K" },
    { name = "f", type = "Fn[V] -> V" },
]
return = "Map[K, V]"
rust = "almide_rt_map_update({m}, {key}, |{f.args}| {{ {f.clone_bindings}{f.body} }})"
ts = "__almd_map.update({m}, {key}, ({f.args}) => {f.body})"

# ── Mutable operations ──

[insert]
description = "Insert a key-value pair in place. Requires var binding."
example = 'map.insert(m, "name", "Alice")'
type_params = ["K", "V"]
params = [{ name = "m", type = "Map[K, V]" }, { name = "key", type = "K" }, { name = "value", type = "V" }]
return = "Unit"
rust = "almide_rt_map_insert(&mut {m}, {key}, {value})"
ts = "{m}.set({key}, {value})"

[delete]
description = "Remove a key in place. Requires var binding."
example = 'map.delete(m, "temp")'
type_params = ["K", "V"]
params = [{ name = "m", type = "Map[K, V]" }, { name = "key", type = "K" }]
return = "Unit"
rust = "almide_rt_map_delete(&mut {m}, &{key})"
ts = "{m}.delete({key})"

[clear]
description = "Remove all entries in place. Requires var binding."
example = 'map.clear(m)'
type_params = ["K", "V"]
params = [{ name = "m", type = "Map[K, V]" }]
return = "Unit"
rust = "almide_rt_map_clear(&mut {m})"
ts = "{m}.clear()"
