[random_bytes]
description = "Generate n cryptographically secure random bytes."
example = 'crypto.random_bytes(16) // => ok([42, 17, ...])'
params = [{ name = "n", type = "Int" }]
return = "Result[List[Int], String]"
effect = true
rust = "almide_rt_crypto_random_bytes({n})?"
ts = "__almd_crypto.random_bytes({n})"

[random_hex]
description = "Generate a random hex string of n bytes (2n hex chars)."
example = 'crypto.random_hex(8) // => ok("a1b2c3d4e5f6a7b8")'
params = [{ name = "n", type = "Int" }]
return = "Result[String, String]"
effect = true
rust = "almide_rt_crypto_random_hex({n})?"
ts = "__almd_crypto.random_hex({n})"

[hmac_sha256]
description = "Compute HMAC-SHA256 of data with a key, returning hex digest."
example = 'crypto.hmac_sha256("secret", "message") // => ok("...")'
params = [{ name = "key", type = "String" }, { name = "data", type = "String" }]
return = "Result[String, String]"
effect = true
rust = "almide_rt_crypto_hmac_sha256(&*{key}, &*{data})?"
ts = "__almd_crypto.hmac_sha256({key}, {data})"

[hmac_verify]
description = "Verify an HMAC-SHA256 signature."
example = 'crypto.hmac_verify("secret", "message", sig) // => ok(true)'
params = [{ name = "key", type = "String" }, { name = "data", type = "String" }, { name = "signature", type = "String" }]
return = "Result[Bool, String]"
effect = true
rust = "almide_rt_crypto_hmac_verify(&*{key}, &*{data}, &*{signature})?"
ts = "__almd_crypto.hmac_verify({key}, {data}, {signature})"
