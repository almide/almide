# ── Server ──

[serve]
description = "Start an HTTP server on the given port with a request handler"
example = 'http.serve(3000, (req) => http.response(200, "ok"))'
params = [
    { name = "port", type = "Int" },
    { name = "f", type = "Fn[Unknown] -> Unknown" },
]
return = "Unit"
effect = true
rust = "{ almide_http_serve({port}, |{f.args}| -> Result<AlmideHttpResponse, String> { Ok({ {f.body} }) })?; }"

# ── Response builders ──

[response]
description = "Create a plain text HTTP response with status code"
example = 'http.response(200, "Hello!")'
params = [{ name = "status", type = "Int" }, { name = "body", type = "String" }]
return = "Response"
rust = "AlmideHttpResponse::new({status}, {body}.to_string())"
ts = "__almd_http.response({status}, {body})"

[json]
description = "Create a JSON HTTP response with status code"
example = 'http.json(200, json.stringify(data))'
params = [{ name = "status", type = "Int" }, { name = "body", type = "String" }]
return = "Response"
rust = "AlmideHttpResponse::json({status}, {body}.to_string())"
ts = "__almd_http.json({status}, {body})"

[with_headers]
description = "Create a response with custom headers"
example = 'http.with_headers(200, body, {"Content-Type": "text/html"})'
params = [{ name = "status", type = "Int" }, { name = "body", type = "String" }, { name = "headers", type = "Map[String, String]" }]
return = "Response"
rust = "AlmideHttpResponse::with_headers({status}, {body}.to_string(), {headers})"
ts = "__almd_http.with_headers({status}, {body}, {headers})"

[redirect]
description = "Create a 302 temporary redirect response"
example = 'http.redirect("/new-path")'
params = [{ name = "url", type = "String" }]
return = "Response"
rust = "almide_http_redirect(&{url}, 302)"
ts = "__almd_http.redirect({url})"

[redirect_permanent]
description = "Create a 301 permanent redirect response"
example = 'http.redirect_permanent("/new-path")'
params = [{ name = "url", type = "String" }]
return = "Response"
rust = "almide_http_redirect(&{url}, 301)"
ts = "__almd_http.redirect_permanent({url})"

[not_found]
description = "Create a 404 Not Found response"
example = 'http.not_found("Page not found")'
params = [{ name = "body", type = "String" }]
return = "Response"
rust = "AlmideHttpResponse::new(404, {body}.to_string())"
ts = "__almd_http.not_found({body})"

# ── Response accessors/mutators ──

[status]
description = "Set the status code on a response"
example = 'http.status(resp, 201)'
params = [{ name = "resp", type = "Response" }, { name = "code", type = "Int" }]
return = "Response"
rust = "almide_http_set_status({resp}, {code})"
ts = "__almd_http.status({resp}, {code})"

[body]
description = "Get the body string from a response"
example = 'let text = http.body(resp)'
params = [{ name = "resp", type = "Response" }]
return = "String"
rust = "almide_http_get_body(&{resp})"
ts = "__almd_http.body({resp})"

[set_header]
description = "Set a header on a response"
example = 'http.set_header(resp, "X-Custom", "value")'
params = [{ name = "resp", type = "Response" }, { name = "key", type = "String" }, { name = "value", type = "String" }]
return = "Response"
rust = "almide_http_set_header({resp}, &{key}, &{value})"
ts = "__almd_http.set_header({resp}, {key}, {value})"

[get_header]
description = "Get a header value from a response"
example = 'let ct = http.get_header(resp, "Content-Type")'
params = [{ name = "resp", type = "Response" }, { name = "key", type = "String" }]
return = "Option[String]"
rust = "almide_http_get_header(&{resp}, &{key})"
ts = "__almd_http.get_header({resp}, {key})"

[set_cookie]
description = "Set a cookie on a response"
example = 'http.set_cookie(resp, "session", "abc123")'
params = [{ name = "resp", type = "Response" }, { name = "name", type = "String" }, { name = "value", type = "String" }]
return = "Response"
rust = "almide_http_set_cookie({resp}, &{name}, &{value})"
ts = "__almd_http.set_cookie({resp}, {name}, {value})"

# ── Request accessors (pure) ──

[req_method]
description = "Get the HTTP method of a request (GET, POST, etc.)"
example = 'let method = http.req_method(req)'
params = [{ name = "req", type = "Request" }]
return = "String"
rust = "almide_http_req_method(&{req})"
ts = "__almd_http.req_method({req})"

[req_path]
description = "Get the URL path of a request"
example = 'let path = http.req_path(req)'
params = [{ name = "req", type = "Request" }]
return = "String"
rust = "almide_http_req_path(&{req})"
ts = "__almd_http.req_path({req})"

[req_body]
description = "Get the body string of a request"
example = 'let body = http.req_body(req)'
params = [{ name = "req", type = "Request" }]
return = "String"
rust = "almide_http_req_body(&{req})"
ts = "__almd_http.req_body({req})"

[req_header]
description = "Get a header value from a request"
example = 'let auth = http.req_header(req, "Authorization")'
params = [{ name = "req", type = "Request" }, { name = "key", type = "String" }]
return = "Option[String]"
rust = "almide_http_req_header(&{req}, &{key})"
ts = "__almd_http.req_header({req}, {key})"

[query_params]
description = "Get all query parameters from a request as a map"
example = 'let params = http.query_params(req) // {"page": "1", "q": "test"}'
params = [{ name = "req", type = "Request" }]
return = "Map[String, String]"
rust = "almide_http_query_params(&{req})"
ts = "__almd_http.query_params({req})"

# ── HTTP client (effect) ──

[get]
description = "Send an HTTP GET request and return the response body"
example = 'let html = http.get("https://example.com")'
params = [{ name = "url", type = "String" }]
return = "Result[String, String]"
effect = true
rust = "almide_http_get(&{url})?"
ts = "await __almd_http.get({url})"

[get_json]
description = "Send a GET request and parse the response as JSON"
example = 'let data = http.get_json("https://api.example.com/users")'
params = [{ name = "url", type = "String" }]
return = "Result[Value, String]"
effect = true
rust = "{ let __body = almide_http_get(&{url})?; almide_rt_json_parse(__body)? }"
ts = "JSON.parse(await __almd_http.get({url}))"

[post]
description = "Send an HTTP POST request with a body string"
example = 'let resp = http.post("https://api.example.com", body)'
params = [{ name = "url", type = "String" }, { name = "body", type = "String" }]
return = "Result[String, String]"
effect = true
rust = "almide_http_post(&{url}, &{body})?"
ts = "await __almd_http.post({url}, {body})"

[post_json]
description = "Send a POST request and parse the response as JSON"
example = 'let result = http.post_json(url, json.stringify(payload))'
params = [{ name = "url", type = "String" }, { name = "body", type = "String" }]
return = "Result[Value, String]"
effect = true
rust = "{ let __body = almide_http_post(&{url}, &{body})?; almide_rt_json_parse(__body)? }"
ts = "JSON.parse(await __almd_http.post({url}, {body}))"

[put]
description = "Send an HTTP PUT request"
example = 'let resp = http.put(url, body)'
params = [{ name = "url", type = "String" }, { name = "body", type = "String" }]
return = "Result[String, String]"
effect = true
rust = "almide_http_put(&{url}, &{body})?"
ts = "await __almd_http.request('PUT', {url}, {body}, {})"

[patch]
description = "Send an HTTP PATCH request"
example = 'let resp = http.patch(url, body)'
params = [{ name = "url", type = "String" }, { name = "body", type = "String" }]
return = "Result[String, String]"
effect = true
rust = "almide_http_patch(&{url}, &{body})?"
ts = "await __almd_http.request('PATCH', {url}, {body}, {})"

[delete]
description = "Send an HTTP DELETE request"
example = 'let resp = http.delete(url)'
params = [{ name = "url", type = "String" }]
return = "Result[String, String]"
effect = true
rust = "almide_http_delete(&{url})?"
ts = "await __almd_http.request('DELETE', {url}, '', {})"

[get_with_headers]
description = "Send a GET request with custom headers"
example = 'let resp = http.get_with_headers(url, {"Authorization": "Bearer token"})'
params = [{ name = "url", type = "String" }, { name = "headers", type = "Map[String, String]" }]
return = "Result[String, String]"
effect = true
rust = "almide_http_get_with_headers(&{url}, &{headers})?"
ts = "await __almd_http.get_with_headers({url}, {headers})"

[request]
description = "Send a custom HTTP request with method, URL, body, and headers"
example = 'let resp = http.request("PUT", url, body, headers)'
params = [{ name = "method", type = "String" }, { name = "url", type = "String" }, { name = "body", type = "String" }, { name = "headers", type = "Map[String, String]" }]
return = "Result[String, String]"
effect = true
rust = "almide_http_request(&{method}, &{url}, &{body}, &{headers})?"
ts = "await __almd_http.request({method}, {url}, {body}, {headers})"
