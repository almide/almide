oracle = "native std::fs (no preopen concept); wasm scans fd_prestat_get to map WASI preopen dirs"
test = "tests/wasm_runtime_test_parts/p2.rs::wasm_cross_target_spec"
note = "Flipped 2026-06-06 (fs drain). spec/wasm_cross/fs_preopen_resolve.almd writes under the gate's sole `--dir=/` preopen then reads it back through a `./`-normalized form of the same absolute path, byte-identical native vs wasm — the write would fail to open if this startup preopen scan produced an empty/wrong table, so an Ok readback proves the scan ran and populated the table. Absolute /tmp path keeps it cwd-independent (verified stable across two launch cwds + repeated runs). The fixture is LOCKED to TWO fs ops + a trailing println: the wasm fs runtime has a SEPARATE pre-existing trap (a WASI-host-written scratch buffer is later reclaimed onto the bump-allocator free list with a poisoned `next` field, so a 3rd fs op — or heavy allocation after an fs op — sends __alloc's free-list walk out of bounds, exit 134). That trap lives in the bump-allocator/fs-buffer-lifetime model (rc_dec free-list push of a host-overwritten block), NOT in these two resolve routines; a multi-op corpus is impossible until it is fixed, but the 2-op fixture is in the stable zone and fully exercises both routines. Do NOT add a 3rd fs op to the fixture."

