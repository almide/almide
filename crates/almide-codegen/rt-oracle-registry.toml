[[routine]]
file = "runtime_p2.rs"
routine = "compile_cow_check"
status = "verified"
oracle = "native eager `.clone()` at a copy-bind before in-place mutation (RcCow / walker IndexAssign|FieldAssign) — value semantics: a mutation through one binding is invisible through another that aliased it"
test = "tests/wasm_runtime_test_parts/p2.rs::wasm_cross_target_spec"
note = "spec/wasm_cross/alias_cow.almd pins every supported shape × in-place op (IndexAssign, FieldAssign, list.push/pop/clear, map.insert, string.push; var/let/chain/branch-arm/record-field aliases) byte-identical native==wasm. __cow_check is now CALLED: `FuncCompiler::cow_if_needed` wires it at every in-place mutation site (statements.rs + the in-place-mutator RuntimeCall path) for vars `AliasCowPass` marks in `codegen_annotations.needs_cow` (copy-aliased AND mutated). The prior grandfathered note's coalescing claim was DISPROVEN: aliased mutable vars get DISTINCT wasm locals (collect_locals: one per VarId), so the write-back-to-its-own-local cow already separates them. The real blockers were (1) no caller, and (2) `__cow_check`'s data-section guard read `rt.heap_start_global`, which is 0 (= the moving heap_ptr global) at runtime-fn compile time — so the guard treated EVERY heap pointer as a header-less data ptr and returned it unchanged; it now uses the immutable `HEAP_START_GLOBAL_IDX` constant. cow_check clones UNCONDITIONALLY — kept after the 0.27.0 frees flip as the conservative choice (extra copy, never corruption) until a rc>1-gated COW is designed against the real-rc model and derives the copy length from the alloc header SIZE field (no per-site byte-size). Native's own holes (the E0382 move-after-use shapes) are fixed in CloneInsertionPass by counting the in-place mutation target as a use."

