# ── rt_regex.rs (regex engine — node-graph backtracking interpreter) ──
# The wasm engine was rewritten as a runtime node-graph compiler+matcher that
# mirrors the native oracle (runtime/rs/src/regex.rs) function-for-function:
# rx_compile / rx_parse_alts / rx_parse_piece / rx_parse_atom / rx_parse_escape /
# rx_parse_class (parser) and rx_node_matches / rx_match_alts / rx_match_seq /
# rx_match_rep / rx_match_one / rx_find_at (matcher). All 12 are pinned by the
# differential fuzz lock (tests/regex_fuzz_test.rs) — 8 ops (is_match/find/
# find_all/full_match/captures/split/replace/replace_first) at 220 cases/op in CI
# (a one-time 800/op = 6400-case sweep proven), plus the headline + generated
# cross-target corpora (spec/wasm_cross/regex_engine.almd, regex_fuzz_batch.almd).
# The grammar emits EMPTY alternation arms (leading/trailing/middle, fully-empty
# pattern) and replace/replace_first over empty matches — the two cross-target
# divergences last fixed here: (1) wasm dropped trailing empty arms (parser
# appended a spurious atom; now the '|' branch continues the loop), and (2) native
# `replace` panicked indexing chars[len] on a zero-width match at end-of-string
# (now guarded). The old byte-walking routines (skip_class/match_class/match_atom/
# atom_len/skip_group/match_anchored/match_search/captures_inner/captures_search)
# were deleted in the rewrite.

