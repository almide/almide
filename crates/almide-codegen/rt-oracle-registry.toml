oracle = "native std::path::Path (the path is used directly); wasm maps an absolute path to the longest-prefix preopen fd + relative remainder"
test = "tests/wasm_runtime_test_parts/p2.rs::wasm_cross_target_spec"
note = "Flipped 2026-06-06 (fs drain). spec/wasm_cross/fs_preopen_resolve.almd exercises this routine TWICE in one program: once on the write path and once on a `./`-NORMALIZED form of the same absolute path on read-back. Both calls must match `/` as the longest (only `--dir=/`) preopen prefix and strip it to the relative remainder so the two calls land on the IDENTICAL host file — the readback equals the written bytes byte-identically native vs wasm, also covering the host path-normalization edge (`/tmp/./x` == `/tmp/x`). Absolute path => cwd-independent (verified across two launch cwds). The old 2-op LOCK is LIFTED (Stage D, 2026-06-11): the multi-op trap's TRUE root was a stale global-index pair in register_runtime — __init_preopen_dirs wrote the preopen TABLE POINTER into the FREE LIST head (pre-frees numbering survived the free_list insertion at index 1), so __alloc's walk treated the table as a free node from boot. Indices fixed AND every host-written fs scratch buffer is now __alloc_pinned (PINNED_RC, immortal by construction); the fixture runs 6 fs ops + allocation churn byte-identically."

