# TypeScript target syntax templates
# Pure formatting — no semantic logic.

# ── Expressions ──

[if_expr]
template = "if ({cond}) {{ {then} }} else {{ {else} }}"

[if_expr_ternary]
template = "({cond}) ? ({then}) : ({else})"

[call_expr]
template = "{callee}({args})"

# ── Stdlib module calls ──

[module_call]
template = "__almd_{module}.{func}({args})"

[binary_op]
template = "({left} {op} {right})"

[field_access]
template = "{expr}.{field}"

[index_access]
template = "{expr}[{index}]"

[pipe_call]
template = "{callee}({pipe_arg}, {args})"

# ── Concat ──

[[concat_expr]]
when_type = "String"
template = "{left} + {right}"

[[concat_expr]]
when_type = "List"
template = "[...{left}, ...{right}]"

# ── Equality ──

[eq_expr]
template = "__deep_eq({left}, {right})"

[ne_expr]
template = "!__deep_eq({left}, {right})"

# ── Power ──

[power_expr]
template = "{left} ** {right}"

# ── Option / Result ──
# Option is erased in TS: some(x) → x, none → null
# Result uses wrapper objects

[some_expr]
template = "{inner}"

[none_expr]
template = "null"

[ok_expr]
template = "{{ ok: true, value: {inner} }}"

[err_expr]
template = "{{ ok: false, error: {inner} }}"

[unwrap_or_expr]
template = "__almd_unwrap_or({expr}, {default})"

# ── Match ──
# TS has no native match — emit as IIFE with if/else chain

[match_expr]
template = "(() => {{ {arms} }})()"

[match_arm]
template = "if ({condition}) {{ return {body}; }}"

[match_arm_default]
template = "return {body};"

# Match patterns (compiled to boolean conditions)
[pattern_some]
template = "({binding} !== null)"

[pattern_none]
template = "({subject} === null)"

[pattern_ok]
template = "({subject}.ok === true)"

[pattern_err]
template = "({subject}.ok === false)"

[pattern_wildcard]
template = "true"

[pattern_literal]
template = "(__deep_eq({subject}, {value}))"

# ── Literals ──

[int_literal]
template = "{value}"

[float_literal]
template = "{value}"

[string_literal]
template = "\"{value}\""

[bool_literal_true]
template = "true"

[bool_literal_false]
template = "false"

[list_literal]
template = "[{elements}]"

[record_literal]
template = "{{ {fields} }}"

[record_field]
template = "{name}: {value}"

# ── String Interpolation ──

[string_interp]
template = "`{template_str}`"

# ── Statements ──

[let_binding]
template = "const {name}: {type} = {value};"

[var_binding]
template = "let {name}: {type} = {value};"

[assignment]
template = "{target} = {value};"

[return_expr]
template = "{value}"

# ── Declarations ──

[fn_decl]
template = "function {name}({params}): {return_type} {{ {body} }}"

[effect_fn_decl]
template = "function {name}({params}): {return_type} {{ {body} }}"

[fn_param]
template = "{name}: {type}"

# ── Type annotations ──

[type_int]
template = "number"

[type_float]
template = "number"

[type_string]
template = "string"

[type_bool]
template = "boolean"

[type_unit]
template = "void"

[type_list]
template = "{inner}[]"

[type_option]
template = "{inner} | null"

[type_result]
template = "{{ ok: true, value: {ok} }} | {{ ok: false, error: {err} }}"

[type_map]
template = "Map<{key}, {value}>"

[type_fn]
template = "({params}) => {return}"

# ── Loops ──

[for_loop]
template = "for (const {var} of {iter}) {{ {body} }}"

[while_loop]
template = "while ({cond}) {{ {body} }}"

[break_stmt]
template = "break;"

[continue_stmt]
template = "continue;"

# ── Lambda ──

[lambda]
template = "({params}) => {{ {body} }}"

[lambda_single]
template = "({params}) => {body}"

# ── Type declarations ──

[type_alias]
template = "type {name} = {type};"

# Walker calls struct_decl for records — TS renders as interface
[struct_decl]
template = "interface {name} {{ {fields} }}"

[struct_field]
template = "{name}: {type};"

[interface_decl]
template = "interface {name} {{ {fields} }}"

[interface_field]
template = "{name}: {type};"

# ── Imports ──

[import]
template = "import {{ {names} }} from \"{module}\";"

# ── Test ──

[test_block]
template = "Deno.test(\"{name}\", () => {{ {body} }});"

[assert_eq]
template = "if (!__deep_eq({left}, {right})) throw new Error(`assertion failed`);"
