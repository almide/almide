[[contract]]
id        = "C-006"
title     = "fan.timeout is the SOLE documented wall-clock divergence (wasm warns)"
statement = "`fan.timeout` is the single documented cross-target divergence (N=1): a wall-clock effect with no portable meaning. Native uses a real thread + `recv_timeout`; wasm has no clock/scheduler/threads, so the thunk runs to completion and the timeout never elapses. The CLI MUST emit a build-time warning when emitting wasm for a program using `fan.timeout`, so the divergence is loud, not silent. It deliberately has NO spec/wasm_cross fixture — it is the exemption, not an equivalence promise."
