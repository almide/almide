# ====================================================================
# ALMIDE BEHAVIOR CONTRACT LEDGER — the language's cross-target law book
# ====================================================================
#
# Each [[contract]] is a NORMATIVE, observable promise the compiler keeps on
# BOTH backends (native Rust and wasm32). "Observable" = stdout, stderr, exit
# code. Native is the oracle; native == wasm is a hard invariant, NOT a "target
# difference". This ledger is the human-readable + machine-checkable index of
# every such promise, with a TRACEABLE link to the executable evidence that
# certifies it.
#
# WHY THIS EXISTS
# ---------------
# The cross-target equivalence GATE (tests/wasm_runtime_test.rs::wasm_cross_target_spec)
# and the wasm-runtime ORACLE-PAIRING registry (crates/almide-codegen/rt-oracle-registry.toml)
# already enforce equivalence at the test + routine level. This ledger adds the
# missing layer: a stable, named CONTRACT each fixture certifies, so that
#   (a) every cross-target fixture is traceable to the promise it locks, and
#   (b) every promise is traceable to executable proof — no claimed behaviour
#       rests on prose alone.
# The gate (scripts/check-contracts.sh) makes that bidirectional link mandatory.
#
# SCHEMA  (flat TOML, one scalar per line — kept awk-parseable like the registry)
# ------
#   [[contract]]
#   id        (string, REQUIRED)  ^C-[0-9]{3}$, unique. THE PRIMARY KEY.
#   title     (string, REQUIRED)  one line.
#   statement (string, REQUIRED)  the normative behaviour, <= 3 sentences. When a
#                                 table / longer prose is needed, the statement is
#                                 a 1-line summary and `doc` points at the prose.
#   since     (string, REQUIRED)  version the contract became normative.
#   status    (enum,   REQUIRED)  "active" | "flagged-for-revision".
#   doc       (string, OPTIONAL)  basename of a docs/contracts/*.md prose file.
#   evidence  (array,  REQUIRED)  >= 1 inline-table entries; each:
#                 path  (string, REQUIRED)  repo-root-relative; must exist on disk.
#                 class (string, REQUIRED)  one of scripts/lib/contract-classes.txt.
#                 name  (string, OPTIONAL)  REQUIRED for *.rs / *.lean / *.toml or
#                                           when class in {fuzz, lean, exhaustive};
#                                           the `fn`/theorem/routine the gate greps.
#                 n     (int,    OPTIONAL)  REQUIRED iff class="fuzz"; the sample count.
#
# THE FLOOR RULE: an `active` contract MUST carry >= 1 evidence of rank >= fixture
# (see scripts/lib/contract-classes.txt). doc-only / by-construction ALONE fail an
# active contract. status="flagged-for-revision" is exempt (may rest on doc-only):
# it records a KNOWN, currently-unfixable divergence (the ratchet may only shrink).
#
# CHANGE DISCIPLINE: changing any observable behaviour REQUIRES updating the
# contract statement AND its evidence in the SAME PR. A new behaviour = a new
# C-NNN + >= 1 fixture. Removing a divergence = flip status to active and drop the
# flag in the same PR. The flagged count is a ratchet; it may only go DOWN.
#
# REVERSE LINK: every spec/wasm_cross/*.almd declares the contract(s) it certifies
# on a `// @contract: C-NNN[, C-MMM]` header line. The link is BIDIRECTIONAL and
# the gate enforces symmetry.


# ── INTEGER DIV/MOD TOTALITY (PR #378) ───────────────────────────────
[[contract]]
id        = "C-001"
title     = "Integer division/modulo by zero is total — it aborts, never traps"
statement = "Integer `/` and `%` by a zero divisor MUST abort with stderr `Error: division by zero` and exit code 1 on BOTH targets — never a native panic (exit 101) nor a wasm `unreachable` trap (exit 134). The `%`-by-zero message is identical to `/` (both `division by zero`). This holds for a runtime-shielded divisor AND a const-foldable literal `10 / 0`, which must still COMPILE: `/` and `%` route through the non-const-evaluable `almide_div!` / `__div_trap`, so rustc never const-evaluates the divide and the abort happens at runtime."
since     = "0.24.0"
status    = "active"
evidence  = [
  { path = "spec/wasm_cross/int_div_by_zero.almd", class = "fixture" },
  { path = "spec/wasm_cross/int_mod_by_zero.almd", class = "fixture" },
  { path = "spec/wasm_cross/int_div_by_zero_literal.almd", class = "fixture" },
  { path = "crates/almide-codegen/rt-oracle-registry.toml", name = "compile_div_trap", class = "doc-only" },
]

[[contract]]
id        = "C-002"
title     = "Signed MIN / -1 overflow aborts, at the TRUE per-width MIN"
statement = "Signed integer `MIN / -1` and `MIN % -1` MUST abort with stderr `Error: integer overflow` and exit 1 on BOTH targets, using the true per-width MIN. Int8 `-128 / -1` must abort even though it lowers to i32 in wasm where `i32.div_s(-128, -1) = 128` does not trap; and wasm `i64.rem_s` DEFINES `MIN % -1 = 0` (no trap), so an explicit MIN/-1 guard before the op realigns wasm with native's `checked_div`/`checked_rem` returning None."
since     = "0.24.0"
status    = "active"
evidence  = [
  { path = "spec/wasm_cross/int_div_overflow.almd", class = "fixture" },
  { path = "spec/wasm_cross/int_mod_overflow.almd", class = "fixture" },
  { path = "spec/wasm_cross/int8_div_overflow.almd", class = "fixture" },
]

[[contract]]
id        = "C-003"
title     = "Non-aborting integer div/mod stay byte-identical"
statement = "Ordinary (non-aborting) integer `/` and `%` — including negative operands and the now-total guarded codepath — MUST produce byte-identical results on both targets. The checked-div rewrite must not perturb the happy path; shielded divisors exercise the same guarded path landing on the non-aborting branch."
since     = "0.24.0"
status    = "active"
evidence  = [
  { path = "spec/wasm_cross/int_div_mod_ok.almd", class = "fixture" },
]

# ── FAN DETERMINISM (PR #377, #369) ──────────────────────────────────
[[contract]]
id        = "C-004"
title     = "fan.race / fan.any / fan.map / fan.settle are deterministic by list order"
statement = "`fan.race` returns thunk[0]'s settled result in LIST ORDER (Ok or Err), NOT wall-clock fastest. `fan.any` tries thunks in list order and returns the first Ok. `fan.map` runs element fns sequentially in list order; `fan.settle` returns results in list order. All are byte-identical native == wasm. (race takes thunk[0] even on Err; any skips failures to find an Ok.)"
since     = "0.24.0"
status    = "active"
evidence  = [
  { path = "spec/wasm_cross/fan_deterministic.almd", class = "fixture" },
  { path = "spec/wasm_cross/fan_map_inline_lambda.almd", class = "fixture" },
]

[[contract]]
id        = "C-005"
title     = "fan error propagation surfaces as the unified main-error abort"
statement = "The first element fn returning Err in `fan.map` (named or inline lambda), a head-Err in `fan.race`, and the all-fail case of `fan.any` (defined `Err(\"fan.any: all candidates failed\")`) all propagate as `Error: <msg>` + exit 1 on BOTH targets via the effect-main termination — NOT a native panic (101) nor a wasm trap (134)."
