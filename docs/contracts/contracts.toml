# ── EAGER ABORTABLE TOP-LETS (Cluster-H) ─────────────────────────────
[[contract]]
id        = "C-007"
title     = "Abortable top-level lets evaluate eagerly at startup"
statement = "A top-level `let` whose initializer can abort MUST be evaluated EAGERLY at program startup, in declaration order, on both targets — even if the binding is never used and even if it would be used only mid-main. wasm evaluates every top-let in `_start`; native forces abortable lazies at main entry. So an abortable top-let aborts before any of main's stdout is emitted."
since     = "0.24.0"
status    = "active"
evidence  = [
  { path = "spec/wasm_cross/top_let_div_eager.almd", class = "fixture" },
  { path = "spec/wasm_cross/top_let_div_used.almd", class = "fixture" },
]

